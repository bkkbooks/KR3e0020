body:
  text: 蘇沈良法醫家類提要臣等謹案蘇沈良方八卷宋沈括所集方書而後人又以蘇軾之説附之者也考宋史藝文志有括靈苑方二十卷良方十卷而别出蘇沈良方十五卷注云沈括蘇軾所著陳振孫書録解題有蘇沈良方十卷而無沈存中良方尤袤遂初堂書目亦同朝公武讀書志則二書並列而於沈存中良方下云或以蘇子瞻論醫藥雜説附之蘇沈良方下亦云括集得效方成一書後人附益以蘇軾醫學雜説蓋朝氏所載良方即括之原本其云或以蘇子瞻論醫藥雜説附之者即指蘇沈良方由其書初尚並行故朝氏兩載其後附蘇説者盛行原本遂微故尤氏陳氏遂不載其原本今永樂大典載有蘇沈良方原序一卷亦括一人所作且自言豫所作良方云云無一字及軾是亦後人增附之後併其標題追改也案明朝瑮寶文堂書目有蘇沈二內翰良方一部是正嘉以前傳本未絶其後不知何時散佚今據永樂大典所載掇拾編次釐為八卷史稱括於醫藥卜算無所不通皆有所論著今所傳括夢溪筆談末為藥議一卷於形狀性味真偽同異辨别尤精軾雜著時言醫理於是事亦頗究心蓋方藥之事術家能習其技而不能知其所以然儒者能明其理而又往往未經試驗此書以經效之方而集於博通物理之手固宜非他方所及矣乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序豫嘗論治病有五難辨疾治疾飲藥處方别藥此五也今之視疾者惟候氣口六脈而已古之人視疾必察其聲音顔色舉動膚理情性嗜好問其所為考其所行已得其大半而又遍診人迎氣口十二動脈疾發于五藏則五色為之應五聲為之變五味為之偏十二脈為之動求之如此其詳然而猶懼失之此辨疾之難一也今之治疾者以一二藥書其服餌之節授之而已古以治疾者先知陰陽運歷之變故山林川澤之竅發而又視其人老少肥瘠貴賤居養性術好惡憂喜勞逸順其所宜違其所不宜或藥或火或刺或砭或湯或液矯昜其故常捭摩其性理搗而索之投幾順變間不容髮而又調其衣服理其飲食異其居處因其情變或治以天或治以人五運六氣冬寒夏暑暘雨電雹鬼靈厭蠱甘苦寒溫之節後先勝復之用此天理也盛衰強弱五臟異稟循其所同察其所偏不以此形彼亦不以一人例衆人此人事也言不能傳之于書亦不能喻之于口其精過于承蜩其察甚于刻棘目不捨色耳不捨聲手不釋脈猶懼其差也授藥遂去而希其十全不其難哉此治疾之難二也古之飲藥者煮煉有節飲啜有宜藥有可以久煮有不可以久煮者有宜熾火有宜溫火者此煮煉之節也宜溫宜寒或緩或速或乘飲食喜怒而飲食喜怒為用者有違飲食喜怒而飲食喜怒為敵者此飲啜之宜也而水泉有美惡操藥之人有勤惰如此而責藥之不效者非藥之罪也此服藥之難三也藥之單用為易知藥之復用為難知世之處方者以一藥為不足又以衆藥益之殊不知藥之有相使者相反者有相合而性易者方書雖有使佐畏惡之性而古人所未言人情所不測者庸可盡哉如酒于人有飲之踰石而不亂者有濡吻則顚眩者漆之于人有終日摶漉而無害者有觸之則瘡爛者焉知藥之于人無似此之異者此稟賦之異也南人食豬魚以生北人食豬魚以病此風氣之異也水銀得硫黃而赤如丹得礬石而白如雪人之欲酸者無過于醋矣以醋為未足又益之以橙二酸相濟宜其甚酸而反甘巴豆善利也以巴豆之利為未足而又益之以大黃則其利反折蟹與柿嘗食之而無害也二物相遇不旋踵而嘔此色為易見味為易知而嘔利為大變故人人知之至于相合而知他藏致他疾者庸可易知耶如乳石之忌參术觸者多死至于五石散則皆用參术此古人處方之妙而世或未喻也此處方之難四也醫誠藝也方誠善也用之中節也而藥或非良奈何哉橘過江而為枳麥得濕而為蛾雞踰嶺而黑鸜鵒踰嶺而白月虧而蚌蛤消露下而蚊喙坼此形器之易知者也性豈獨不然乎豫觀越人藝茶畦稻一溝一隴之異逺不能數步則色味頓殊況藥之所生秦越燕楚之相逺而又有山澤膏瘠燥濕之異稟豈能物物盡其所宜又素問説陽明在天則花實戕氣少陽在泉則金石失理如此之論採掇者固未嘗晰也抑又取之有早晚藏之有焙朗風雨燥濕動有稿暴今之處藥或有惡火者必日之而後咀然安知採藏之家不常烘煜哉又不能必此辨藥之難五也此五者大概而已其微至于言不能宣其詳至于書不能載豈庸庸之人而可以易言醫哉豫治方最久有方之良者輒為疏之世之為方者稱其治效常喜過實千金肘後之類尤多溢言使人不復敢信豫所謂良方者必目覩其驗始著于篇聞不預也然人之疾如向所謂五難者方豈能必良哉一覩其驗即謂之良殆不異乎刻舟以求遺劒者豫所以詳著其狀于方尾疾有相似者庶幾偶值云爾篇無次序隨得隨注隨以與人拯道貴速故不暇待完也沈括序
