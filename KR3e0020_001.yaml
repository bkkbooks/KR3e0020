  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0020_WYG_001-1a, image: WYG0738/WYG0738-0220c.png}
body:
  text: 蘇沈良方卷一宋蘇軾沈括撰錬丹砂法王倪丹砂無所不主尤補生益精血愈痰疾壯筋骨久服不死王倪者丞相遵十二代孫文明九年為滄州無棣令有桑門善相人知其死期無不驗見倪曰公死明年正月乙卯倪以為妄囚之復令驗邑人其言死者數輩皆信倪乃出桑門禮謝之日為死計忽有人不言姓名謂倪曰知公憂死我有藥可以不死公能從我授乎倪再拜稱幸乃出鍊丹砂法授之倪餌之過明年正月乃復召桑門視之桑門駭曰公必遇神藥而有異色且不死開元元年倪妻之弟亦遇異人授以杏丹法曰吾聞王倪能鍊丹砂願以此易之倪以杏丹賜其子辨而倪與授杏丹者後皆仙去刺史李休光表聞賜其第為道觀開元十二年上東封太山拜辨左散騎常侍隱遁不知所終此舊傳也光明辰砂二十八兩甘草逺志去心稱檳榔訶藜勒皮各二大兩聖濟總録云一兩紫肉桂八大兩桂一半留蒸丹砂時拍碎再復搗右甘草等四味銼以水二大斗案此下疑有脫字後用細布囊盛丹砂懸于釡中著水和藥炭火煮之第一日兼夜用陰火水紋動第二日兼夜用陽火魚眼沸第三日兼夜用木火動花沫沸第四日兼夜用火火汩汩沸第五日兼夜用土火微微沸第六日兼夜用金火乍緩乍急沸第七日兼夜用水火緩調調沸先期泥二釜常暖水用添水煮藥釜水涸即添暖水常令不減二斗七日滿即出丹砂于銀盒中蒸其盒中布肉桂一兩拍碎即勻布丹砂又以餘桂一兩覆之即下盒置甑中先布糯米厚三寸乃置盒又以糯米擁覆上亦令上米厚三寸許桑薪火蒸之每五日換米換桂其甑蔽可用完竹子為之不爾蒸久甑墮下釜中也甑下側開一小孔常暖水用小竹子注添釜中勿令水減第一五日兼夜用春火如常炊飯第二五日兼夜用夏火猛于炊飯第三五日兼夜用秋火似炊飯乍緩乍急第四五日兼夜用冬火緩于炊飯依五行相生用文武火助之藥成即出丹砂以玉捶力士鉢中研之當下磣如麵即可服之以榖子煎丸如桐子大每日食上服一丸每日三食服三丸非頓服三丸鍊成丹砂二十兩為一月劑二年服盡盡後每十年即鍊服三兩仍取正月一日起服一月使盡即須每十年三兩不可旋合當宜預鍊取一劑藏貯隨時服之其硃砂須是上等丹砂案文云二十兩為一月劑二年服盡則各自正月一日起服至三十日止當日服三錢三分有零計十年應鍊服一百兩乃合前二年之數文又云盡後每十年即鍊服三兩仍取正月一日起服一月使盡則又是每日止服一分矣多少太相懸絶蓋兩每十年十字疑是一字之誤餘文恐有錯脫又案前方云辰砂二十八兩此云二十兩文亦互異豈多經煮煉重體變輕然耶榖子煎法取赤榖子熟時絞汁煎如稠餳可用和丹砂如無榖子榖皮亦得凡服丹砂忌一切魚肉陳宿生冷蒜尤忌生血物及見血穢江陰葛侍郎中年病足幾廢久治不瘥得此服遂愈而輕健過于少時年八十嵗飲啖視聽不衰寶此方未嘗𫝊人豫治平中感足病萬端求得之然遊宦竟今未曽得為之有太醫孫用和亦嘗得此方仁仁時表獻之其大槩雖相似然甚粗略非真方也服茯苓說茯苓自是仙家上藥但其中有赤筋脉若不能去服久不利人眼或使人眼小當削去皮切為方寸塊銀石器中清水煮以酥軟解散為度入細布袋中以冷水揉擺如作葛粉狀澄取粉而筋脉留布袋中棄去不用其粉以蜜和蒸過食之尤佳胡麻但取純黑脂麻九蒸九暴入水爛研濾取白汁銀石器中熬如作杏酪湯更入去皮核研爛棗肉與茯苓粉一處溲和食之尤有竒效陽丹訣冬至後齊居嘗吸鼻液潄煉令甘乃咽下丹田以三十磁器皆有蓋溺其中已隨手蓋之書識其上自一至三十置淨室選謹朴者守之滿三十日開視其上當結細砂如浮蟻狀或黃或赤密絹帕濾取新汲水淨淘澄無數以穢氣盡為度淨瓷瓶合貯之夏至後取細研棗肉丸如桐子大空心酒吞下不限丸數三五日後取盡夏至後仍依前法採取却候冬至後服此名陽丹陰煉須清淨絶欲若不絶欲真砂不結陰丹訣取首生男子之乳父母皆無疾恙者并養其子善飲食之日取其乳一升只半升亦可以硃砂銀作鼎與匙如無硃砂銀山澤銀亦得慢火熬煉不住手攪令如淡金色可丸即丸如桐子大空心酒吞下亦不限丸數此名陰丹陽煉世人亦知服秋石然皆非清淨所結又此陽物也須復經火經火之餘皆其糟粕與燒鹽無異色世人亦知服乳乳陰物不經火煉則冷滑而漏精氣也此陽丹陰煉陰丹陽煉蓋道士靈智妙用沉機捷法非其人不可輕泄慎之慎之秋石方凡世之煉秋石者但得火煉一法而已此藥須兼用陰陽二石方為至藥今具二法于後凡火煉秋石者陽中之陰故得火而凝入水則釋然消散歸于無體蓋質去但有味在此離中之虛也水煉秋石陰中之陽故得水而凝遇暴潤千載不變味去而質留此坎中之實二物皆出于心腎二臟而流于小腸水火二臟騰蛇元武正氣外假天地之水火凝而為體服之還補太陽相火二臟上為養命之本具方子後陰煉法小便三五石夏月雖腐敗亦堪用分置大盆中以新水一半以上相和旋轉擾數百匝放令澄清撇去清者留濁腳又以新水同擾水多為妙又澄去清者直候無臭氣澄下秋石如粉即止暴乾刮下如膩粉光白粲然可愛都無臭氣為度再研取用産男之乳和如膏烈日中暴乾如此九度須揀好日色乃和蓋假太陽真氣也第九度即丸如桐子大暴乾每服三十丸溫酒下陽煉法小便不計多少大約兩桶為一擔先以清水挼好皂角濃汁以布絞去滓每小便一擔入皂角汁一盞用竹箆急攪令轉百千遭乃止直候小便澄清白濁者皆定底乃徐徐撇去清者不用只取濁腳並作一滿桶又用竹箆子攪百餘匝更候澄清又撇去清者不用十數擔不遇取得濃腳一二斗其小便須先以布濾過勿令有滓取得濃汁入淨鍋中熬乾刮下搗碎再入鍋以清湯煮令化乃于筲箕內布紙筋紙兩重傾入筲箕紙內滳淋下清汁再入鍋熬乾又用湯煮化再依前法滴淋如熬乾色未潔白更准前滴淋直候色如霜雪即止乃入固濟沙盒內歇口火煆成汁傾出如藥未成窩更煆一兩遍候瑩白玉色即止細研入沙盒內固濟頂火四兩養七晝夜久養火尤善再研每服二錢空心溫酒下或用棗肉為丸如桐子大每服三十丸亦得空心服陽煉日午服陰煉各一服廣南有一道人惟與人煉秋石為業謂之還元丹先大夫曽得瘦疾且嗽凡九年萬方不效服此而愈郎侍郎簡帥南海其室病夜夢神人告之曰有沈殿中携一道人能合丹可愈汝疾宜求服之空中擲下數十粒曰此道人丹也及旦卧席上得藥十餘粒正如夢中所見及先大夫到番禺郎首問此丹先大夫乃出丹示之與夢中所得不殊其妻服之遂愈又豫族子常病顛眩腹鼓久之漸加喘滿凡三年埀困亦服此而愈皆只自火煉者時豫守宣城亦大病踰年族子急以書勸服此丹云實再生人也豫方合煉適有一道士又𫝊陰煉法云須得二法相兼其藥能洞人骨髓無所不至極祕其術久之道士方許傳依法服之又驗此藥不但治疾可以常服有功無毒豫始得之甚艱難意在救濟人理不當祕火煉秋石世人皆能之煎煉時須大作爐鼎煎煉數日臭達四鄰此法極省力只一小鍋便可煉體如金石永不暴潤與常法功力不侔久疾人只數服便效記松丹砂祥符東封有扈駕軍士晝卧東嶽真君觀古松下見松根去地尺餘有補塞處偶以所執兵攻刺之塞者動有物如流火自塞下出遙走入地中軍士以語觀中人有老道士拊膺曰吾藏丹砂于是三十年矣方卜日取之因掘地數丈不復見道士悵恨成疾竟死其法用硃砂精良者鑿大松腹以松氣鍊之自然成丹吾老矣不暇為此當以山澤銀為鼎有蓋擇砂之良者二斤用以松明根節懸胎煮之傍置沙瓶煎水以補耗滿百日取砂玉捶研七日投入蜜中通油瓷瓶盛日以銀匕取少許醇酒攪湯飲之當有益也蘇沈良方卷一
