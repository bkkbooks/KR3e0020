body:
  text: 蘇沈良方卷二宋蘇軾沈括撰治風氣四神丹熟乾地黄元參當歸羌活各等分右搗為末和蜜丸桐子大空心酒服丸數隨宜列仙傳有山圖者入山采藥折足仙人教服此四物而愈因久服遂度世余以問名醫康師孟師孟大異之云醫家用此多矣然未有專用此四物如此方者師孟遂名之曰四神丹洛下公卿士庶爭餌之百病皆愈藥性中和可常服大畧補虚益血治風氣亦可名草還丹四味天麻煎方世傳四味五兩天麻煎方蓋古方本以四時加減但傳藥料耳春肝旺多風故倍天麻夏伏陰故倍烏頭秋多瀉痢故倍地榆冬伏陽故倍元參此方常服不獨去病乃保身延年與仲景八味丸並驅矣木香散治偏風癱瘓脚氣等疾羌活一兩麻黄去節水煑少時去沫二兩防風三分木香檳榔附子炮去皮白术川烏頭炮去皮草荳蔲和皮用陳橘皮去瓤牛膝酒浸一宿杏仁生去皮尖當歸酒浸一宿人參茯苓甘草炙川芎官桂不得見火各半兩右十八味剉如麻荳每服一兩水一碗薑一七片煎至一盞去滓得七分温服大腸不通加大黄末每服一錢以老少加減如久不通加至三五錢不害心腹脹加葶藶并滑石末每服各一錢如上膈壅滯痰𠻳氣急加半夏升麻天門冬知母末各二錢同煎其藥滓兩合為一服用水一碗半煎至一盞服此藥福唐陳氏者鬻以自給郡人極神之未有得其方者一日為其親戚攘得與予予作官處即合以施人如法煮服以衣覆取汗不過三五服輒瘥所至人來求藥者無窮其騐如神左經丸治小兒筋骨諸疾手足不隨不能行歩運動草烏頭肉白者生去皮臍木鼈子去殻别研白膠香五靈脂各三兩半班貓一百箇去足翅少醋煮熟當歸一兩右為末用黑荳去皮生杵粉一斤醋煑糊為丸如鷄頭實大每服一丸酒磨下筋骨疾但不曽針灸傷筋絡者四五丸必效予鄰里胡生者一女子膝腕軟不能行立已數年生因遊淨因佛寺與僧言有一僧云能治出囊中丸十枚以四枚與生曰服此可瘥生如其言與服女子遂能立生再求藥于院僧曰非有愛也欲留以自備必欲之須合一料生與錢一千辭不受止留百錢後數日得藥并餘錢十餘悉歸之同院僧佐其理藥乃剽得此方予至嘉興有一里巷兒年十嵗雙足不能行以一丸分三服服之盡四五丸遂能行自此大為人所知其效甚著此藥能通榮衛導經絡專治心腎肝三經服後小便少淋澁乃其驗也燒肝散治三十六種風二十四般冷五勞七傷一切痢疾脾胃久虚不思飲食四肢無力起止甚難小便赤澁累年口瘡久醫不瘥但依此法服之必愈茵陳犀角石斛柴胡芍藥白术各半兩乾薑防風桔梗紫參人參胡椒官桂去皮白蕪荑呉茱萸各一兩右共十五味同為末以羊肝一具如無即以豬肝代之分作三分淨去血脉脂膜細切用末五錢葱白一莖細切相和以濕紙三五重裹之掘地坑納以火燒令香熟早晨生薑湯嚼下大叚冷勞不過三服見效廬州刁參軍病洩痢日久黑瘦如墨萬法不瘥服此一二服下墨汗遂安伊祁丸治鶴膝風及腰膝風縮伊祁頭尾全者桃仁生白附子阿魏桂心白芷安息香用胡桃瓤研各一兩沒藥三分便已前八物用童五升無灰酒二升銀器内熬令厚乳香三分當歸北漏蘆牛膝芍藥地骨皮去土威靈仙羌活各一兩右為丸如彈丸大空心煖酒化下一丸胡楚望博士病風疰手足指節皆如桃李痛不可忍服此悉愈烏荆丸治風川烏頭一兩炮去皮荆芥穗二兩右醋糊丸如桐子大每服二十丸或酒或熟水下有疾食空時日三四服無疾早晨一服少府郭監丞少病風搴搐頤頷寛軃不收手承頷然後能食服此六七服即瘥遂長服之已五十餘年年七十餘強健鬚髪無白者此藥療腸風下血尤妙余所目見服此而瘥者一嵗之内已數人天麻煎丸治風氣不順骨痛或生赤㸃隱疹日乆不治則加冷痺筋骨緩弱案此方原缺今從王兗博濟方補入五靈脂附子白术赤小豆乾蠍炒羌活防風各一兩天麻半兩右先以沈香二兩酒一升煎為膏毋犯鐡器入藥擣千下為丸桐子大空腹下二十丸過五日加至三十丸秋夏宜荆芥湯春冬宜荆芥酒春末夏初生赤根白頭瘡服之瘥服威靈仙法服威靈仙有二法别一帖云以威靈仙雜牛膝服之視氣虚實加減牛膝以酒浸焙乾二物皆為末丸散皆可丸即以酒煑麫糊一法淨洗陰乾擣羅為末雜酒浸牛膝末或蜜丸或為散酒調牛膝之多少視已氣之虚實而増減之此眉山一僧患脚氣至重依此服半年遂永除一法取藥粗細得中寸截之七寸作一貼毎嵗作三百六十貼置床頭五更初面東細嚼一貼候津液滿口嚥下此牢山一僧年百餘嵗上下山如飛云得此藥方二法皆以得真為要真者有五驗一味極苦二色深黑三折之脆而不韌四折之微塵如胡黄蓮狀五斷處有黑白暈謂之鸜鵒眼無此五驗則藁本根之細者耳又須忌茶别一帖云但忌茶若常服此藥當以皁角槐芽為茶取極嫩者湯中略煑一沸便取出布裹壓乾入焙以軟熟火焙乾與飲茶無異以槐茅皁角至嫩者依造草茶作或只取外臺祕要代茶飲子方常合服乃可煮肝散治肝痿脚弱及傷寒手足乾小不隨紫苑桔梗蒼术芍藥各等分右為末每服四錢羊肝半具大竹刀切勿犯水勿令血散入鹽醋葱薑酒同煮熟空腹食前日三服榖熟尉宋鈞傷寒病差後雙足但有骨不能立服此散見其肉生一兩日間生復如舊烏頭煎丸治風毒氣攻眼久成内外障痛楚努肉赤脈等病十年者皆可療黑荳二兩小者川烏頭一兩去皮生青橘皮半兩去瓤同烏頭為末以水一升三合浸一宿緩火煎成膏子牛膝枸把子荆芥穗川芎羌活地龍去土白蒺藜當歸乾薄荷各半兩甘菊花一兩右將前青皮煎和為丸如桐子大毎服二十丸空心茶酒任下蜜湯下亦得先君因失少女感傷哭泣忽目瞑不見物治之踰月復明因盛怒呵一罪人目復瞑踰年得此服不盡一劑目復如故又方羌活防風酒浸一宿黄耆木賊附子炮蛇蛻一條青竹炙蟬殻荆芥穗甘草甘菊花白蒺藜去角旋覆花石決明泥裹燒赤别研右等分除附子蛇蛻決明皆剉碎新瓦上烙令燥為散每二錢第二米泔煎熟調下空心日午夜卧各一服予少感目疾踰年人有以此方見遺未暇為之有中表兄許復嘗苦目昬後已都瘥問其所以瘥之由云服此藥遂合服未盡一劑而瘥自是與人莫不驗通闗散治大人小兒諸風傷寒旌徳烏頭四兩皺皮有蘆頭肌白者藁本防風川芎當歸天南星白芷乾薑雄黄細研桂心各半兩並生勿近火右為細末煨葱酒下一字或半錢癱瘓加牛黄麝香小兒減半薄荷酒下此散余目見醫數人今聊記其一二曽在江南見市門有卧者問之乃客販因病偏風醫之遂至病困為邸家所委時伯氏為令使人舁到令舍調藥飲之又與十服數日伯氏出市有一人扶倚牀而呼曰昔日卧者今能扶榻而行矣藥盡願少繼之伯氏又與十服服訖能起又一吏病瘡而攣踰歳月卧矣伯氏與散二錢七為八服吏繆以為一服服已僵眩嘔吐幾困將殆已乃用續命湯輩汗之末乃用此為宜蓋風病多挾熱若未發散便投烏頭輩或不相當也更消息治之必驗辰砂散治風邪諸癎狂言妄走精神恍惚乍歌乍哭飲食失常疾發仆地吐沫戴目魂魄不守醫禁無驗辰砂一兩須光明有墻壁者酸棗仁微炒乳香光瑩者各半兩右量所患人飲酒幾何先令恣飲沈醉但勿令吐靜室中服藥訖便安置床枕令睡以前藥為一服温酒一盞調之頓服令盡如素飲酒少人但隨量取醉病淺人一兩日深者三五日睡不覺令家人潛伺之覺即神魂定矣慎不可驚觸使覺一為驚寤更不可治上樞呉公少時病心服一劑三日方寤遂瘥治諸風上攻頭痛方地龍榖精草為末同乳香火餅上燃以紙筒籠烟鼻聞之即瘥側子散治筋脈抽掣疼痛不止側子炮裂去皮臍赤箭漏盧芎藭棗仁微炒海桐皮各一兩桂心五加皮仙靈脾牛膝木香枳殻麩皮炒去瓤各半兩右為末每服一錢温酒調下不計時候服此藥尤治目赤痛屢用每驗蓋攻治肝風凡目赤皆主于風余于四生散論之甚詳此方主療亦四生散之類也四生散治腎臟風治眼治癬白附子脚生瘡用黑附子沙苑蒺藜羌活黄茋右等分皆生為末每服二錢鹽酒調下空腹猪腎中煨服尤善予為河北察訪使時病赤目四十餘目黑晴傍黯赤成瘡晝夜痛楚百療不瘥郎官邱革相見問予病目如此曽耳中痒否若耳中痒即是腎家風有四生散療腎風每作二三服即瘥閭里號為聖散子予傳其方合服之午時一服臨卧一服目反大痛至二鼔時乃能眠及覺目赤稍散不復痛矣更進三四服遂平安如常是時孫和甫學士帥鎮陽聞余説大喜曰吾知所以自治目矣向久病目嘗見吕吉甫參政云頃目病久不瘥因服透水丹乃瘥如其言修合試服二三十服遂愈乃知透水丹亦療腎風耳凡病目人當記一事予在河北病目時曽治浴具洛州守閣君綬見訪云目赤不可浴浴湯驅體中熱併集頭目目必甚又轉運判官李長卿亦云然予不信卒浴浴畢目赤遂大作行數程到鉅鹿見陳彦升學士以病目廢于家問其病目之因云頃年病目赤飲酒歸過同舍林億邀同太學浴彦升舊知赤目不可浴堅拒之不得僶俛一浴浴已幾失明後治之十餘年竟不瘥此亦以為戒也又予之門人徐搆病癬久不瘥服四生散數日都除蘇沈良方卷二
