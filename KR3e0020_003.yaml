body:
  text: 蘇沈良方卷三宋蘇軾沈括撰聖散子昔豫覽千金方三建散云於病無所不治而孫思邈特為著論謂此方用樂節度不近人情至於救急其驗特異乃知神物效靈不拘常制至理開惑智不能知今豫得聖散子殆此類也自古論病惟傷寒為急表裏虛實日數證候應汗應下之類差之毫釐輒至不救而用聖散子者一切不問隂陽二感或男子女人相易狀至危篤連飲數劑而汗出氣通飲食漸進神宇完復更不用諸藥連服取差其餘輕者心額微汗正爾無恙藥性小熱而陽毒發狂之類入口便覺清涼此藥殆不可以常理而詰也若時疫流行不問老少良賤平旦輒煮一釡各飲一盞則時氣不入平居無事空腹一服則飲食快美百疾不生真濟世衛家之寶也其方不知所從出而故人巢君榖世寶之以治此疾百不失一余既得之謫居黃州連歲大疫所全活者不可勝數此方指松江水為誓盟不得傳人余竊隘之乃以傳蘄水龎君安得龎以醫聞於世又善著書故以授之且使巢君名與此方同不朽也主疾功效非一去春杭州民病得此藥全活者不可勝數所用皆中下品藥略計每千錢即得千服所濟已及千人由此積之其利甚溥凡人欲施惠而力能自辦者猶有所止若合衆力則人有善利其行可久今募信士就楞嚴院修製自立春後起施直至來年春夏之交有入名者徑以施送本院昔薄拘羅尊者以訶梨勤施一病比丘故獲報身身常無衆疾施無多寡隨力助緣疾病必相扶持功德豈有限量仁者惻隱當崇善因陳無擇三因方云此藥似治寒疫因東坡作序天下通行辛未年永嘉瘟疫被害者不可勝數蓋寒疫流行其藥偶中抑未知方土有所偏宜未可考也東坡便謂與三建散同類一切不問似太不近人情夫寒疫亦自能發狂蓋隂能發躁陽能發厥物極則反理之常然不可不知今録以備療寒疫用者宜審究其寒溫二疫無使偏奏也聖散子方草豆䓻去皮麵裹炮一箇木猪苓去皮石菖蒲高良薑獨活去蘆頭附子炮製去皮臍麻黃去根厚朴去皮薑汁炒藁本去瓤土炒芍藥枳殼去瓤麵炒柴胡澤㵼白术細辛防風去蘆頭藿香半夏薑汁製茯苓各半兩甘草炙一兩右銼碎如麻豆大每服五錢清水一鍾半煮取八分去滓熱服餘滓兩服合為一服重煎空心服下小柴胡湯治解傷寒諸症柴胡二兩黃芩人參甘草炙生薑各三錢半夏湯洗一兩半大棗十二枚破右銼如麻豆大以水三升煮取一升半去滓再煎取丸溫服日三服此古法也今可作粗散每服三錢棗三枚薑三片水一盞半煎至八分溫服氣實疾勢盛者加至四五錢不妨並去滓此張仲景方余以今稱量改其分劑孫兆更名黃龍湯近歲此藥大行患傷寒不問隂陽表裏皆令服之此甚誤也此藥治傷寒雖主數十證大要其間有五證最的服之必愈一者身熱心中逆或嘔吐者可服若因渴飲水而嘔者不可服身體不溫熱者不可服二者寒熱往來者可服三者發潮熱可服四者心煩脅下滿或渴或不渴皆可服五者傷寒已瘥後更發熱者可服此五證但有一證更勿疑便可服服之必瘥若有三兩證以上更的當也其餘證候須子細詳論及脉候相當方可用蓋世人但知小柴胡治傷寒不問何證便服不徒無效兼有所害故備論於此使人了然易曉本方更有加減法雖不在此五證內用之亦屢效今亦載於此若胸中煩而不嘔去半夏加人參合前成一兩栝蔞根一兩若腹中痛者去黃芩加芍藥三分此一證最有驗常時腹痛亦療若脅下痞鞭去大棗加牡蠣一兩若心下悸小便不利去黃芩加茯苓一兩若不渴外有微熱者去人參加桂三分溫服微汗愈若咳去人參大棗生薑加五味子半兩乾薑半兩元祐二年時行無少長皆咳服此皆愈麻黃丸治傷寒解表止頭痛兼治破傷風及一切諸風麻黃六兩去節沸湯泡去黃水焙乾烏頭水浸三日頻換水去皮乾炮去臍天南星别搗半夏湯洗七遍石膏泥裹火燒通赤研以上各四兩白芷三兩甘草一兩炙龍腦半兩只用樟木龍腦但要發散不必南番龍腦麝香一分右為末水煮天南星為丸如小彈子大每服一丸葱茶或茶酒嚼下薄荷亦得連二三服此本余家白龍丸已編入靈苑後又加麻黃作六兩寒水石用石膏末為衣治傷寒至佳小小傷寒服之立瘥解表藥中此尤神速治暑暍逡巡悶絶不救者道上熟土大蒜右各等多少爛研冷水和去滓飲之即瘥此方在徐州沛縣城門上板書揭之不知何人所施治暑傷肌膚多瘡爛或因搔成瘡者林才中嘗暑中臥病肌膚多瘡爛汁出有一乳姥曰此易愈取乾壁土揉細末傅之隨手即瘥木香丸治瘴雞心檳榔陳橘皮去白兩各二青木香大附子人參厚朴官桂去無味者羌活荆三稄濁活乾薑炮甘草炙芎藭川大黃銼微炒芍藥各半兩牽牛子一斤淘去浮者揩栻熟搗取末四兩餘滓不用肉豆䓻六枚去殼止㵼方用右十五味為末磁器盛之密封臨服用牽牛末二兩藥末一兩同研令勻煉蜜為丸如桐子大心腹脹滿一切風勞冷氣臍下刺痛口吐清水白沫醋心痃癖氣塊男子腎臟風毒攻刺四體及陽毒腳氣目昏頭痛心間嘔逆及兩脅堅滿不消臥時橘皮湯下三十丸以利為度此後每夜二十丸女人血痢下血刺痛積年血塊胃口逆手足心煩熱不思飲食薑湯下三十丸取利每夜更服二十丸小兒五歲已上疳氣腹脹氣喘空心溫湯下五七丸小者減丸數服凡胸腹飽悶不消脾泄不止臨臥溫酒下取利食毒癰疽發背山嵐瘴氣才覺頭痛背膊拘緊便宜服之快利為度常服可以不染瘴疾凡瘴疾皆因脾胃實熱所致常以涼藥解膈上壅熱并以此藥通利彌善此丸本治嵐瘴及瘟瘧大效李校理敦裕嘗為傳刻石於大庾嶺䝉效者不可勝數余伯氏任閩中嘗擁兵捕山寇過漳浦軍人皆感瘧用此治之應時患愈余在江南時值歲發瘧以此藥濟人其效如神皆以得快利為度又記凡久瘧服藥訖乃炙氣海百壯又炙中脘三十壯尤善枳殼湯治傷寒痞氣胸滿欲死者桔梗枳殼炙去瓤各一兩右細銼如末豆大用水一升半煎減半去滓分二服傷寒下早則氣上膨胸世俗即謂之結胸多更用巴豆粉霜膩粉下之下之十有七八死此蓋瀉其下焦下焦虛則氣愈上攻胸膈多致不救凡胸脹病只可㵼膈若按之堅硬而痛此是結胸如胸有水須用大黃甘遂輩下之陷胸丸之類是也若按之不甚硬亦不甚痛此名痞氣正虛氣熱鼓脹只可用黃芩黃連大黃之類化之嘗有人患胸脹已危困作結胸痞氣治皆不瘥史大夫以此湯飲之下黃水一升遂瘥余得此法用之如神若是痞氣莫不應手而消凡傷寒胸脹勿問結胸痞氣但先投此藥若不瘥然後别下藥緣此湯但行氣下膈耳無他損又西晉崔行功方傷寒或下或不下心中結滿胸脅痞塞氣急厥逆欲絶心胸高起手不能近二三日輒死用㵼心大小陷胸湯皆不瘥此當是下後虛逆氣已不理而毒復上攻氣毒相摶結於胸中氣毒相激故致此病療之當用加減理中丸先理其氣次療諸疾加减理中丸人參白术茯苓甘草炙兩各二乾薑炮一兩半枳實十六片麵炒或炙右為末蜜丸彈子大一丸不效再服余時用此神速下喉氣即相接續復與之不過五六彈丸胸中溪然矣渴者更加栝藪二兩下痢者加牡蠣二兩余以告領軍韓康伯右衛毛仲祖光祿王道預臺郎顧君苖著作殷仲堪並悉用之咸歎其應速於時枳實乃為之貴緣此病由毒攻於內多類少隂泄痢之後理應痞結雖已泄痢毒尚未除毒與氣爭凝結於胸時或不痢而毒已入於胃胃中不通毒必上衝或氣先不理或上焦痰實共相衝結復成此患大抵毒之與氣相干不宣關津壅遏塗徑不通故㵼心療滿而不療氣雖復服之其瘥莫由療毒氣結莫過理中丸解毒通氣痞自消釋然乾薑性熱故減其分茯苓通津栝􅌣除渴牡蠣止痢謹審其宜無不得矣家人黃珍者得病如上其弟扶就叔尚書乞藥余曰可與理中丸坐中數客皆疑不可余自決於箱中取一彈丸與之竺法太調余曰此人不活君微有緣矣與時合暝許比至三籌扶又來便叩頭自搏四坐愕然謂其更劇叔問何如扶答向藥一服便覺大佳更復乞耳余謂竺法太曰上人不憂作緣但恐夜更來乞失人眠耳果爾如何余復與數彈丸明日便愈叔遂至今用之護軍司馬劉元寶妾病亦如此叔復與之二丸服盡便瘥叔以此施之遂多蒙救濟傷寒難療故詳記焉此行功自叙也余以此丸與枳殼湯兼服理無不驗理中丸所用枳實只是枳殼古人只謂之枳實後人方别出枳實一條五積散蒼术二十兩桔梗十兩陳橘皮六兩白芷甘草各三兩當歸二兩川芎一兩半芍藥白茯苓半夏湯洗兩各一麻黃春夏二兩秋冬三兩乾薑春夏一兩半秋冬二兩枳殼麩炒去瓤四兩搗以下三物可别肉桂春夏三兩秋冬四兩厚朴二兩薑炙右前十二味為粗末分六服大鍋內緩火炒令微赤香熟即止不可過焦取出以淨紙藉板牀上令冷入後三物和之為丸每服三錢加薑棗煎至六分去滓服傷寒手足逆冷虛汗不止脈沈細靣青嘔逆加順元散一錢同煎熱服産婦陳疏難産經兩三日不生胎死腹中或産母氣乏委頓産道乾濕加順元散水七分酒三分煎相繼兩服氣血內和即産胎死者不過三服當下其順元散多量産母虛實傷寒發熱脅內寒者加䓤白二寸豉七粒同煎相繼三兩服當以汗解順元散烏頭二兩附子炮天南星炮兩各一木香半兩右余叔祖得此方於民家故吳中至今謂之沈氏五積散大抵此散能溫裏外但內外感寒脈遲細沉伏手足冷毛髮恂憟傷寒裏證之類大啜三兩杯當手足溫或汗乃愈今世名醫多用此散治氣極效和一切氣通血絡無出此藥人病脾瘧用紫金丸逐下乃服此散數服多愈紫金丹硫黃針沙各三錢鐵粉膩粉各五錢四味炒為末粟米飯丸如彈子大乳香湯下一丸氣實服一丸半至二丸七棗散治脾寒瘧疾川烏頭大者一箇炮良久移一處再炮凡七處炮滿去皮臍為細末都作一服用大棗七箇生薑十片葱白七寸水一碗同煎至一盞疾發前先食棗次溫服只一服瘥元祐二年兩浙瘧疾盛作常州李使君舉家病瘧甚久萬端醫禁不效遇客傳此方一家服之皆一服瘥又長興賈耘老傳一方與此方同只烏頭不炮却用沸湯泡以物蓋之候溫更泡滿十四遍去皮切焙乾依上法作一服耘老云施此藥三十年治千餘人皆一服瘥葱尉法治氣虛陽脫體冷無脈氣息欲絶不省人及傷寒隂厥百藥不效者右以葱用索纒如盞許大切去根及葉惟存白長二寸許如大餅餤先以火脅一靣令通熱又勿令灼人乃以熱處搭病人臍連臍下其上以尉斗滿貯火尉之令葱餅中熱氣鬱入肌肉中須預作三四餅一餅壞不可尉又易一餅良久病人當漸醒手足溫有汗即瘥更服四逆湯輩溫其內萬萬無憂余伯兄病傷寒冥昧不知人事八日四體堅冷如石藥不可復入用此遂瘥集賢校理胡完夫用此方拯人之危不可勝數金液丹案原方缺今從王衮博濟方補入硫黃十兩精瑩者研碎入罐子及八分為度勿大滿石龍芮兩握又云狗蹄草一握水鑑草兩握稻田中生一莖四花如田字亦名水田草獨莖生以黃土一掬同搗為泥只用益母草井泥搗亦得右固濟藥罐子約厚半寸置平地以瓦片覆罐口四靣炭五斤擁定以熱火一片自上燃之候罐子九分赤口縫有碧焰急退火以濕灰三斗覆至冷剖罐取藥削去沈底滓濁准前再煆通五煆為足藥如熟雞卵氣并取罐埋潤地一夜又以水煮半日取藥桞木槌研頓滴水候揚之無滓更研令乾每藥一兩用蒸餅一兩化同搗丸之暴乾金液丹舊方主病甚多大抵治氣羸凡久疾虛困久吐痢不瘥老人臟祕傷寒脈微隂厥之類皆氣羸所致服此多瘥大人數十丸至百丸小兒以意裁度多少皆粥飲下羸甚者化灌之小兒久吐痢垂困藥乳皆不入委頓待盡者併與數十丸往往自死得生少與即無益余親見小兒吐痢極已氣絶棄之在地知其不救試漫與服之復活者數人蘇沈良方卷三
