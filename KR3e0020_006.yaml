body:
  text: 蘇沈良方卷六宋蘇軾沈括撰四神散治血氣心腹痛當歸芍藥川芎各一兩乾薑半兩炮右每服二錢暖酒調下豫每作以療婦人氣痛常以一服瘥千緡湯急下涎齊州半夏七枚炮裂四破之皂角去皮炙一寸半甘草一寸生薑兩指大右同以水一碗煮去半頓服沈待制興宗常病痰喘不能卧人扶而坐數日矣客有見之者曰我曽如此得藥一服瘥我以千緡酬之謂之千緡湯可試為之興宗得湯一啜而愈白雪丸治痰壅胸膈嘈逆及頭目昏眩困倦脹痛天南星炮烏頭炮去皮白附子生半夏洗兩各二滑石研石膏研龍腦研麝香研分各一右麵和為丸極稀為妙如菉豆大每服三十丸薑蠟茶或薄荷茶下豫每遇頭目眩困精神懵冒胸中痰逆憒憒如中酒則服此藥良久間如搴去重裘豁然清爽頓覺夷暢食後服為佳龍膽丸解暴熱化涎涼膈清頭目草龍膽白礬燒沸定各四兩天南星半夏各二兩半以水浸切作片用漿水雪水鍾半同煮三五沸焙乾取各稱二兩右為末麵糊為丸極稀為妙如桐子大每服三十丸蠟茶清下食後臨卧服應痰壅膈熱頭目昏重服之頓清嶺南瘴毒才覺意思昏悶速服便解咽喉腫痛口舌生瘡凡上壅熱涎諸證悉可服小兒尤良治內障眼本草云熟乾地黃麥門冬車前子相得治久患內障眼有效屢試之信然其法細搗羅蜜丸如桐子大每服溫酒熟水任下然三藥皆潤難搗旋焙旋搗和合異常甘香真竒藥也還睛神明酒黃連五兩石決明草決明硝石生薑石膏蕤仁秦皮山茉萸當歸黃芩沙參朴硝甘草炙芍藥澤瀉桂心薺子車前子淡竹葉柏子仁防風川烏頭辛夷人參川芎白芷瞿麥桃仁去皮尖雙仁細辛地膚子已上各三兩龍腦三錢丁香半兩真珠生二十五顆右㕮咀練囊盛用好酒五斗甕中浸之春秋十四日夏七日冬二十一日食後服半合勿使醉吐稍稍增之百日後明目如舊忌熱麵酢葵穢臭五辛及猪魚雞馬驢肉生冷粘滑入房恚怒大勞大憂愁大寒熱悉慎之惟不療枯睛損者破但白睛不枯損服此藥更生瞳子平復如故出五符漢司空倉元明兩目肓經十五年兩瞳子俱損翳出如雲赤白膚肉如乳頭服此酒未滿百日兩目還得清淨夜任針勝如未患時十倍晉大夫于公失明經十二餘年不辨明夜兩目俱損無瞳子身年七十服此酒一百日萬病除兩目明見物益明豫表親有病目者服此酒十餘日翳皆消盡治諸目疾用盛熱湯酒器銅器尤佳以手掬尉眼眼緊閉勿開亦勿以手揉眼但掬湯冷即已若有疾一日可三四為之無疾日一兩次沃令眼明此法最治赤目及臉眥癢豫自十八嵗因書小字病目楚痛凡三十年用此法遂永瘥樞密邵興宗苦目昏用此法踰年後遂能燈下觀細字大率血得溫則榮釋目全要血養若衝風冒冷歸即沃之極有益于目㸃眼熊膽膏古銅錢二十一枚完用菊花四兩黃連鬱金黃蘗各二兩銀以上菊花揉碎黃連以下三物細銼用水二升石器中慢火熬至一升新布濾去滓入後藥鉛丹𤣥精石井泉石龍骨不灰木蕪荑去皮蕤仁去殼代赭石各半兩滑石烏賊魚骨去堅處和各一兩中以上細研成膏粉入蜜六兩并前藥汁勻銀器重湯煮六時辰再以新綿絞濾去滓入後藥硼砂麒麟竭沒藥青鹽銅青各半兩川牙硝一兩乳香一分麝香生龍腦各一錢水銀粉二錢熊膽半斤雄雀粉七粒碙砂一錢半右竝細研羅過再研如麵入前藥內再用重湯煮如稀餳如要為丸即便熬可丸即丸如梧桐子大每用一丸水化竝以銅筯㸃兩眥此本舒州甘露山儼長老方治目疾殊聖久患瘀肉瞼爛諸疾㸃此無不差者暴赤目風癢只㸃三兩次即差有人瘀肉滿眼用此亦消盡清明如未病時熬藥須用銀器皆須上品藥洗濯揀擇極細方有效􅐨實散治眼􅐨麻子以栁木製磑子磨之馬尾篩取黃肉其烏殼棄不用每十兩可得四兩精肉非栁木磑不能去殼碾為末取豶豬肝薄切裛藥中令相著用緩火炙肝熟為末臨卧陳米飲調下二錢一法煎釅酸醋為丸每服二十丸一法取􅐨實內囊蒸一次暴乾為末或散或蜜丸溫水下豫親家女子兒童時病翳一目中五翳病十五年治之莫愈醫者皆以為不可療之疾試用炙肝散十許日一翳消踰月消盡治眼齒前日與歐陽叔弼朝無咎張文潛同在戒壇余病目昏數以熱水洗之文潛曰忌㸃洗目有病當存之齒有病當勞之不可同也治目當如治民治齒當如治軍治民當如曹參之治齊治軍當如商鞅之治秦頗有理故追録之貍鳩丸治內障青盲翳暈及時暫昏暗一切眼疾花鳩一隻去毛腸嘴足炙熟羊肝一具炒細辛防風肉桂黃連牡蠣甘菊花白蒺藜各五兩白茯苓瞿麥各四兩羌活三兩蔓菁子二升蒸三炊蕤仁半升決明二合右煉蜜丸如桐子大每服二十至三十丸空心日午臨卧茶酒下半月見效忌房事五辛豬雞魚蒜楚醫陳中立雙盲數年服此視物依舊偏頭痛方裕陵𫝊王荆公偏頭痛方云是禁中祕方用生萊蔔汁一蜆殼仰卧注鼻中左痛注右右痛注左或兩鼻皆注亦可數十年患皆一注而愈荆公與僕言已愈數人硫黃丸治頭痛硫黃二兩細研硝石一兩右水丸指頭大空心蠟茶嚼下豫中表兄病頭風二十餘年每發頭痛如破數日不食百方不能療醫田滋見之曰老母病此數十年得一藥遂效就求得之十丸日服一丸十餘日後滋復來云頭痛平日食何物即發答云最苦飲酒食魚滋取魚酒令恣食云服此藥十枚豈復有頭痛耶如其言食之竟不發自此遂瘥豫與滋相識數嵗臨别以此方見遺陳州懷醫有此藥丸如梧桐子大每服十五丸暑暍懵冒者冰冷水服下咽即豁然清爽傷冷以沸艾湯下葫蘆巴散治氣攻頭痛葫蘆巴微炒三稜銼醋浸一宿炒乾各一兩乾薑炮一分右為末每服二錢溫生薑湯或酒調下凡氣攻頭痛一服即瘥萬法不愈頭痛如破者服之即愈尤利婦人姻家有病瘧差後頭痛號呼十餘日百方不效用一服如失小小頭痛更捷治鼻衄取河陽石炭心如無只用光明者為末新水下立止又法鼻左衄用綿塞右耳右衄塞左耳神應余亦曽用之刺薊散治鼻衄大薊根一兩相思子半兩右每服十錢水一盞煎至七分去滓放冷服王朝散女子大衄一日已昏不識人舉家發哭用藥皆無效有人傳此方一服止治鼻衄不可止欲絶者用茅花無即以根代每服一大把銼水兩碗煎濃汁一碗分二服林次中御史在楚中嘗訪一故人久之不出或問之云子婦衄血垂盡方救視未及延客坐中一客云適有藥急令掇茅花一大把煎濃汁一碗帶囊中取一小紅丸二粒茅花煎湯吞下一服即瘥而不言其方後有人聞之曰此止是茅花之功耳試復問之其人大笑曰誠如此紅丸乃含香硃砂丸恐不信茅花之功以此為記耳豫在鄜延一將官卒病衄甚困以此療之即瘥又徐德沾教衄者急灸項後髮際兩筋間宛穴中三壯立定蓋血自此入腦注鼻中常人以線勒頸後尚可止衄此灸決效無疑又方用青蒿納鼻中即止又方治鼻衄久不止昏暈棕櫚皮不以多少燒灰右隨鼻左右搐之緑雲膏治口瘡黃蘖半兩螺子黛二錢右同研如碧玉色臨卧置舌根下一字咽津無妨遲明差凡口瘡不可失睡一夜失睡口瘡頓增灸牙疼法隨左右所患眉尖微近後骨縫中小舉臂取之當骨解陷中灸五壯豫目覩灸數人皆愈灸畢項大痛良久乃定永不發豫親病齒百方治之皆不驗用此法灸遂瘥服松脂法松脂以真定者為良細布袋盛清水百沸湯煮浮水面者以新竹罩籬掠取投新水中久煮不出者皆棄不用入生白茯苓末不製但削去皮搗羅細末耳拌勻每日早取三錢匕著口中用少熱水攪潄仍以指如常法熱揩齒畢更以熱水咽之仍以潄吐如常法能牢牙駐顔烏髭也水氣腫滿法張微之屢驗聖濟總録名商陸豆湯生商陸切作麻豆赤小豆如商陸之多鯽魚三枚去腸存鱗右二物實魚腹中取盈線縛之水三升緩煮赤豆爛取去魚只取二物空腹食之以魚汁送下不汗利即差甚者二日再為之不過三劑微之家乳姥病水飲一劑愈逐氣散博濟治氣白商陸根去粗皮薄切陰乾或昞乾右為末黃顙魚三尾大蒜三瓣菉豆一合水一升同煮以豆爛為度先食豆飲汁送下又以汁下藥末二錢水化為氣內消省郎王申病水氣四體悉滿不能坐卧夜倚壁而立服一劑即愈二薑散治小腸氣髙良薑乾薑等分炮入分留二分椎右一大錢用續隨子去皮細研紙裹出油取白霜入一字將熱酒一盞入豬膽汁十數滴同調下一服瘥川楝散治小腸氣下元閉塞不通川楝子一兩和皮破為四片巴豆一兩并殼捶令碎右用帶殼巴豆一兩捶令碎同和勻入銚內炒令紫色取出去巴豆只取川楝子淨刷去末每服一錢先炒茴香稱一錢令香用酒一盞沖更煎三五沸去滓調川楝子末連進一服得下泄立瘥此方同治逺年裏外膁瘡方于建安軍中人吳美得之倉卒散治小腸氣山梔子四十九枚燒半過附子一枚炮右每服二錢酒一盞煎至八分入鹽一捻溫服脾腎氣攣急極痛不可屈伸腹中冷重如石痛不可忍自汗如瀉手足冰冷久不差卧欲死者服此藥一劑甚者兩服瘥余自得效亦屢以治人皆驗斷弓弦散治小腸氣五靈脂蒲黃等分右二物先用釅醋一合熬藥成膏以水一小盞煎至六七分熱呷此又名失笑散療婦人血氣尤驗曽有婦人病心腹痛欲死十餘日百藥不驗服此亦愈治小便數方並治渴取純糯米糍一手大臨卧炙令軟熟啖之以溫酒送下不飲酒人溫湯下多啖彌佳行坐良久待心間空便睡一夜十餘行者當夜便止豫嘗以為戲術與人賭物用之如有神聖或言假火氣溫水送不然也大都糯稻工縮水凡人夜飲酒者是夜輒不尿此糯米之力也又記一事豫故人劉正夫罷官閩州次建溪叩一大家求舍閉門不納既而使人謝云其父有甚病不能延客劉問其狀曰疾渴殆死矣劉許為其營藥俄而其子弟羣至求治其父劉即燒藥與之明日來謝云飲藥一杯是夜啜水減七八分此劉君目擊者其方用糯稻稈斬去穗及根取其中心淨器中燒作灰每用一合許湯一碗沃浸良久澄去滓嘗其味如薄灰汁乘渴頓飲之此亦糯米縮水之一驗也故因附此又方治小便不通琥珀研成粉每服二錢煎萱草根濃汁調下空心服豫友人曽小腸閉甚成淋每旋只一二滴痛楚至甚用惡藥逐之皆不通王郇公與此藥一服遂通人有病痔腸腫因不能尿候如淋疾他藥不能通惟此法可治茯苓散治夢中遺泄堅白茯苓為末每服五錢溫水調下空心食前臨卧服一日四五服方書言夢泄皆云腎虛但補腎澀精然亦未嘗有驗豫論之此疾有三證一者至虛腎不能攝精心不能攝念或夢而泄或不夢而泄此候皆重須大服補藥然人病此者甚少其餘皆只是心虛或心熱因心有所感故夢而泄此候差輕人之患者多是此候但服茯苓散自差豫纍以拯人皆良驗又有少年氣盛或鰥夫道人極制情欲因念而泄此為無病醫及攝生家多言夢寐甚于房勞此殆不然豫嘗驗之人之病天行未復而犯房勞者多死至于夢寐則未嘗致困此決然可知但夢寐自有輕重耳香薑散治久患脾泄生薑四兩黃連一兩右銼如豆大慢火一處炒令薑乾脆深赤去薑取黃連為細末每服二錢空腹蠟茶清下不過二服即愈暴下方歐陽文忠公嘗得暴下國醫不能愈夫人云市人有此藥三文一貼甚效公云吾輩臟腑與市人不同不可服夫人使以國醫藥雜進之一服而愈公召賣者厚遺之求其方久之乃肯傳但用車前子一味為末米飲下二錢匕云此藥利水道而不動氣水道利則清濁分榖臟自止矣治瀉痢方肉豆蔲刳作甕子入通明乳香少許復以末塞之不盡即用麵和少許裹豆蔲煨熟焦黃為度三物皆研末仍以茶末對烹之四神散治痢乾薑黃連當歸黃柏皆炒分各等右為末烏梅一箇煎湯調下二大錢水瀉等分赤痢加黃蘖白痢加薑後重腸痛加黃連腹中痛加當歸並空心食前服豫家常作此藥夏月最獲用大凡瀉痢宜食酸苦忌甘醎蓋酸收苦堅甘緩醎濡不可不知也芍藥散治痢茱萸炒半兩黃連炒赤芍藥各一兩右三味水煎服陳應之療痢血方丞相曽魯公痢血百餘日國醫無能療者應之取鹽水梅除核研一枚合蠟茶加醋湯沃服之一啜而瘥又丞相莊肅梁公亦痢血應之曰此授水榖當用三物散亦數服而愈三物散用胡黃連烏梅肉竈下土等分為末蠟茶清調下食前空腹溫服樗根散治水瀉裏急後重樗根皮一兩枳殼半兩甘草一錢右粥飲下二錢食前一服止健脾散治胃虛泄瀉老人臟泄尤效烏頭炮三分厚朴薑汁炙甘草炙乾薑炮各一分右服一錢水三合生薑三片煎至二合熱服並二服止豫家嘗貯此藥治脾泄極驗憲宗賜馬總治瀉痢腹痛方生薑和皮切碎如粟米用一大盞並草茶相對煎服元祐二年歐陽文忠公得此疾百藥不效豫傳此方而愈治腸痔下血如注久不差者用市河中水每遇更衣罷便冷沃之久沃為佳久患者皆瘥豫始得于信州侯使君曰沃之兩次即瘥豫用之亦再沃而瘥並與數人用皆然神竒可驚不類他藥無河水井水亦可療寸白蟲錫沙作銀泥者即以黃丹代油和桐子大蕪荑檳榔二物等分為散右煎石榴根濃汁半升下散三錢丸五枚中夜服旦日下豫少時病白蟲始則逾粳米數嵗之後遂長寸餘古說蟲長盈尺人即死以藥攻之下蟲數合或如帶長尺餘蟠蜒如豬臟熠熠而動其末寸斷輒為一蟲去病少已後數月復如初如是者數回後得此方服之蟲悉化為水自此永斷蘇沈良方卷六
