body:
  text: 蘇沈良方卷七宋蘇軾沈括撰小還丹治背疽癰癤一切膿腫膩粉水銀硫黃同研分各一大巴豆肉四十箇右將巴豆單覆排銚底以三物按上巴豆令平以瓷蓋蓋之四靣濕紙封慎勿令氣泄炭火四兩緩緩燒時于水中蘸銚底少時又燒頻蘸為善其盞上底內滴水一點如大豆乾則復滴以三滴乾為度候冷研陳米飲丸作二十三丸熱水吞下疏下惡物以白粥補之吳中往往用此活人曽無失者柞葉湯治發疽柞木葉乾荷葉乾兩各四萱草根乾甘草節生地榆各一兩右細銼每服半兩水二碗煎去半分二服早晚各一服二服滓並煎作一服有膿血在內自大腸下未成者自消忌一切毒物有瘡者貼後藥通明牛皮膠水半升熬令化黃丹入膠中煮三五沸各一兩右放溫冷以雞羽傅瘡口瘡即斂未成瘡者塗腫處即內消丞相王荆公疽發背醫攻之皆不效漸覺昏懵不省人事上元縣朝奉郎梁彥章有藥自言其效如神荆公服之利下惡物一升許遂瘥乃以方獻丞相豫從丞相得之此藥常人服之並不疏轉但逐膿血耳療腫毒癰疽未潰令消已潰令速愈草烏頭屑水調雞羽掃腫上有瘡先以膏藥貼定無令藥著瘡人有病瘡腫甚者塗之坐中便見皮皺稍稍而消初塗病人覺冷如氷瘡乃不痛白膏登州孫醫方善消腫及墜擊所傷栁白皮半兩洗隂乾白蠟四錢黃丹二錢胡粉當歸根各三兩油四兩熱三兩八錢右先熱油入桞皮候變色去滓入諸藥數攪良久下治癰疽方忍冬嫩苖一握甘草半兩生用右忍冬爛研同甘草入酒一斤半砂瓶中塞口煮兩食頃溫服豫在江西有醫僧鑒清善治發背疽得其方用老翁鬚余頗神祕之後十年過金陵聞醫王琪亦善治瘍其方用水楊藤求得觀之乃老翁鬚也又數年友人王子淵自言得神方嘗活數人方用大薜荔又過歷陽杜醫者治瘍嘗以二萬錢活一人用千金藤過宣州寧國尉王子駁傳一方用金銀花海州士人劉純臣傳一方用金叉股此數君皆自神其術求其草視之蓋一物也余以本草考之乃忍冬也古人但為補藥未嘗治疽其用甘草煮飲之法製方皆同若倉卒求不獲只用乾葉為散每服三方寸甘草方寸酒煮服之亦可然不及生者佳忍冬葉尖莖圓生莖葉皆有毛田野籬落處處有之兩葉對生春夏新葉梢尖而色嫩緑柔薄秋即堅厚色深而圓得霜則葉卷而色紫經冬不雕四月開花極芬芳可愛似茉莉瑞香初色白數日變黃每黃白相間故一名金銀花花開曵蕊數莖如絲故一名老翁鬚一名金叉股冬間葉圓厚似薜荔故一名大薜荔可移根庭檻間以偹急治癰疽瘍久不合方僕嘗讀本草露蜂房蛇蛻皮亂髮各燒灰每味取一錢七酒調服治瘡久不合神驗僕屢試之燒灰略存性雲母膏雲母光明者薄揭先煮硝石研甘草各四兩槐枝柏葉近道者不堪栁枝桑白皮各二兩陳橘皮一兩桔梗防風桂心蒼术菖蒲黃芩髙良薑柴胡厚朴人參芍藥胡椒子龍腦白芷白芨白斂黃茋芎藭茯苓夜合花附子炮上各半兩煎已㕮阻次松脂當歸木香麒麟竭沒藥麝香乳香各半兩末已上為黃丹十四兩羅鹽花五錢水銀二兩右先煉油令香下雲母良久投附子已上藥候焦黃住火令冷以綿濾去滓始下末皆須緩火常以桞木箆攪勿令手濾畢再入鐺中進火下鹽花至黃丹急攪須臾色變稍益火煎之膏色凝黑少取滴水上凝結不粘手即下火先炙一磁器令熱傾藥在內候如人體溫以絹袋子盛水銀手彈在膏上如針頭大以蠟紙封合勿令風乾可三二十年不損發背先以敗蒲一斤水三升煮三五沸候如人體溫將洗瘡帛拭乾貼藥又以藥一兩分三服取溫酒下未成膿者即差更不作瘡瘰癧骨疽毒穿至骨者用藥一兩分三服溫酒下甚者即下惡物兼外貼腸癰以藥半兩分五服甘草湯下未成膿者當時消已有膿者隨藥下膿膿出後每日酒下五丸桐子大膿止即住服風眼貼兩太陽腎癰并傷折痛不可忍者酒下半兩老少更以意加減五日一服取盡外貼包裹當時止痛箭頭在肉者外貼每日食少爛菉豆箭頭自出虎豹所傷先以甘草湯洗後貼每日一換不遇三貼蛇狗傷生油下十丸桐子大仍外貼難産三日不生者溫酒下一分便下血暈欲死以薑汁和小便半升溫酒下十丸桐子大死者復生胎死在腹以榆白湯下半兩便生小腸氣茴香湯下一分每日一服血氣當歸酒下一分每日一服中毒溫酒洗汗襪汁每日一服吐瀉出惡物為度一切癰疽瘡癰蟲虺所傷並外貼忌羊肉國史補言有白岑者療發背甚驗為淮南節度使髙適脅取其方然不甚效岑後至九江為虎食驛吏于囊中得其真方太原王升之寫以傳布後魯國孔南得岑方為王傳號靈方今具于後案原方傳寫缺吕君子西華洛陽人孤貧無家著作郎韋顒與其先有舊以其子妻之應秀才五舉不第與同志張元伯入王屋山時莫知者俄西華疽發背膿血被身筋骨俱見告元伯曰吾將死矣幸扶至水傍俟天命而已元伯無可奈何因從其言露卧數宿忽有一胡僧振錫而至視其瘡曰膜尚完可治也乃出合中藥塗于軟帛上貼四五日生肌八九日肉乃平飲膳如故僧云吾將去他時慮發此疾無藥療因示其方約令祕之西華頓首曰微吾師遺骸丘畝矣雖力未能報願少伸區區可遽言别乎僧曰始以君病而來今愈吾去矣安用報為乃去數步之間不復見西華歸以事白韋韋因請其方西華不與韋知其終不可得乃白于考功裴輝卿員外請以名第啖而取之裴如其言西華對曰愚修文以求名不沽方以求進竟下第而返後河南尹聞之謂韋曰有一計取之韋曰何計曰陷于法禁免其罪而購之逾月果罹其罪獄成引決親喻之令出其所祕方可以免雪西華守死無求免之色尹無奈何乃釋之西華知失考功之旨又見薄于外舅雖苦日甚而文趣轉疏如是經五稔見黜于春官乃罷去薄遊梁宋間值姨弟李潛尉封丘淹延半歲以酒食過量疽復發既篤欲以前方療之懼人知之憂疑阻喪久不能決潛知意乃喻之曰聞兄神授名方今病亟矣奈何懼潛見方之故忍死而不治豈保生承繼之意耶西華不得已乃口授之潛欲審其意皆三反而復之及藥成潛親傅之尋疾平乃遊荆蠻不知所之潛于是手疏五十本遍遺親識以矯西華之僻前潤州金壇縣尉得其方嘗遊西蜀活將死者五六人每欲傳其事貼于後以家故行役未諧此意貞元十年冬十月偶于秋浦與霍願同詣周南宅夜話既久言及方書遂授之于周南令志之方曰此發背者自內而出外者也熱毒中膈上下不以蒸背上虛處先三五日隱脈妨悶積漸成腫治出皮膚結聚成膿也其方如後案此節文義不甚可解疑有錯落白麥飯石色黃類麥飯者尤佳炭火燒取出醋中浸十遍白斂末鹿角二三寸截之不用自脫者元帶腦骨者炭火燒煙盡為度杵為末各等分右並搗細末取多年米醋于銚中煎並令魚眼沸即下前件藥末調如稀餳以箆子塗傅腫上只當瘡頭留一指靣地勿令合以出熱氣如未膿當內消若已作頭當撮小若日久瘡甚肌肉損爛筋骨出露即布上塗藥貼之瘡上乾即再換但以膈中不穴無不差瘡切忌手按宜慎之劉夢得傳信方亦有不及如此之備小硃散治癮疹久不瘥每發或先心腹痛痰噦麻痺筋脈不仁成塊赤土有沙石者不可用當歸各等分右冷酒調下二錢日三服兼用塗藥護火草大葉者又名景天生薑和皮不洗等分研鹽量多少右塗摩癢處如遍身癮疹塗發甚處餘處自消治發瘡疹不透虛伏危困者以人牙齒三五枚炙令黃為末乳香湯調下余目見兩人用之皆一服瘥一方燒過溫酒下亦可服訖片時瘡便透柴胡湯治瘰􅊓柴胡荆芥穗秦芁知母當歸官桂藿香甘松敗龜醋炙川烏頭地骨皮白膠香白芍藥以上各半兩京芎藭一兩苧根濕稱二兩碎銼右藥並淨洗曝乾搗羅為末每服二錢水一盞入薑三片大棗一箇同煎七分去滓服早午食後夜睡各一服三服滓又煎一服忌一切魚麵等毒仍忌房事不善忌口及諸事者服此藥無驗又用貼瘡藥石行根不以多少為細末用蜜調如膏藥用貼瘡口兩三日一看頻易之此二方得于華亭陶中夫宰君中夫先得柴胡一方用之如神又于里巷醫處得此貼藥方相須暝若神契中夫在華亭半年之間治二十餘人皆愈此豫寓秀州所目見者又方取鯽魚長三寸者去腸以和皮巴豆填滿腹麻皮纒以一束稈草燒煙盡研硬米粥丸菉豆大粟飲下一丸未利加一丸以利為度每日以此為凖常令小利盡劑乃安甚者破者效尤速忌豬肉動風物祛風丸治風毒瘰癧皂莢三十枚十枚火燒過十枚塗酥炙去皮子十枚水浸槌去滓何首烏蒸乾薄荷元參各四兩精羊肉半斤右以皂莢水煮肉使爛細研和藥為丸梧桐子大每服二十丸空心溫酒下薄荷湯亦可伯父吏部病瘰癧百療不差得此乃愈梁氏老嫗頷下有瘡如垂囊閩僧嘉履病瘰癧服之皆半月愈此皆豫目擊者地骨散治惡瘡地骨皮一物先刮去浮皮别收之次取浮皮下二白粉為細散其白粉下堅赤皮細銼與浮皮一處為粗末粗末細散各貯之每用粗皮一合許煎濃汁乘熱洗瘡直候藥湯冷以軟綿裛乾乃用細散傅之每日洗貼一次以差為期梓州路轉運判官張君曾當胸下鋭骨端隱隱微痛後月餘漸有小瘰子如豆粒久之愈大如栗遂潰膿成瘡痛楚不可卧每夜倚物而坐至曉如此三年不瘥國醫仇鼎沈遇明輩治之都不驗後赴梓州行次華隂道中有舊相識華山道士武元亨來迎就客亭中見之元亨首問胸瘡如何張答以未瘥元亨曰嘗得一藥效驗無此久欲寄去不值便入聞當道過華隂特來此奉候已數日今日方欲還山而公適至殆此疾當瘥矣遂手授此方張如法用之始用藥洗極覺暢適異常淋至夜深方用散傅瘡遂不痛是夜得睡至曉自此每夜一次洗貼瘡不復痛矣然尚未斂間或一夜不洗貼則復發痛自此用之便不敢闕凡四個月瘡雖尚在而起居飲食如常一旦瘡忽痛通夕不寢淋之亦痛不止使人視之瘡中一肉夥如石榴子痛已漸定數日間瘡口肉已合自此遂瘥太學博士馬君希孟之弟亦嘗患瘡于胸腹間久不瘥瘡透腹見膜醫皆閣手得此散用之即瘥揚州士人李君在太學手掌心生一瘡日久掌穿透惟有筋骨謁假歸廣陵值張梓州得方服之遂瘥此藥暫用未差切不可住要在勤志不怠乃見竒驗小疔瘡腫疼痛只以枸把根生銼煎濃汁熱淋亦效治癩方苦胡麻半升别搗天麻二兩乳香三分右荆芥蠟茶下三錢忌鹽酒房事動風物凡一百二十日服半月後兩腰眼炙十四狀此丞相長安公家方醫人無數若頭面四體風瘡腫癢多汁者只七八服即瘥豫親試之治遠年裏外臁瘡不差者檳榔乾豬糞燒成性各半兩龍骨八分水銀粉少許右三物為細末入水銀粉研勻先以鹽水洗瘡熟絹裛乾以生油調藥如膏貼瘡三日一易三五易定瘥忌食無鱗魚鮓熱麵凡脛內外瘡世謂裏外臁瘡最難得藥此方併前治小腸氣方本建安軍人吳美者後美犯偽印坐死司理參軍王炳之憐其曉事常加存恤其人臨刑泣念曰生平有兩方治疾如神賞賣以自給可惜死而不傳遂以獻炳之屢用有驗豫就炳之求得之許孫二真人方用定粉不用水銀粉夏子益方多地骨皮一味并用地骨皮煎湯洗火府丹治下疰腳瘡甘遂肥實連珠者一兩薄切疏布囊盛芎藭一塊銼如豆右以紙籠香罏令至密不漏煙頂留一竅懸甘遂囊于竅間其下燒芎藭一塊令煙熏甘遂燒過更燃一塊芎藭盡取甘遂為末三十歲以上氣盛者滿三錢虛者平二錢半羯羊腎一對㓟開勻分藥末在內淨麻纒定炭火炙熟無令焦臨卧爛嚼溫酒下隨人酒量能飲一斗者可飲五升以髙物支起雙腳一服即瘥療久瘡右用豬筒骨中隨以膩粉和為劑復納骨中泥裏火煨香熟出先以溫鹽水浴瘡乃傅之臨安陳令傳極妙治瘡疥甚者草烏頭一兩每箇四破之大豆一兩半右同入沙瓶煮極爛每服一片豆少許空腹下豫兄子病瘡偏體拘攣立不可卧卧不可起服此即瘥治隂瘡癢痛出水久不瘥銅錢百枚烏梅七枚鹽二錢右水一碗半煎至一碗熱洗又方蠟茶五倍子等分膩粉少許右先以漿水蔥椒煎湯洗後傅之未差再為之二方相須用之無不即驗治癬久患用之即瘥決明子不以多右為末加少水銀粉為散先以物擦破癬上以散傅之立瘥繫瘤法右取稻上花蜘蛛十餘箇置桃李枝上候垂絲下取東邊者撚為線子繫定瘤子七日候換瘤子自落沈興宗待制家老姥病瘤如掌拳用此法繫之至三四瘤子遂乾一夜忽失所在天明于枕邊得之如一乾栗袁當時方瘤落後以白花蛇頭燒灰和輕粉傅之治甲疽弩肉裏甲膿血疼痛不瘥膽􅈨燒右先剔去肉中案此句下傳寫缺傅藥瘡上縱有弩肉一傅即乾落續骨丸臘月豬脂五兩蠟半斤以二洗煎鉛丹羅自然銅蜜陀僧研細兩各四白􅈨十二兩麒麟竭沒藥乳香硃砂細研兩各一右新鼎中先鎔豬脂次下蠟出鼎于冷處下蜜陀僧鉛丹自然銅緩火再煎滴入水中不散更出鼎于冷處下諸藥用桞箆攪勻瀉入瓷盆內不停住手攪至凝丸如彈丸且用笋皮之類襯之極冷收凡折傷用一丸入少油火上化開塗傷痛處以油單護之其甚者以燈心裹木夾之更取一丸分作小丸熱蔥酒下痛即止如藥力盡再覺痛更一服痛即止骨折者兩上便安牙疼甚者貼之即止此方小説所載有人遇異人得之豫家每合以拯人無不應驗神授散治傷折內外損川當歸洗淨别搗鉛粉洛粉最上各半兩硼砂二錢右同研勻細每服二錢濃煎蘇枋汁計調下若損在腰以上先喫淡麵半碗然後取藥在腰以下即先服藥後喫麵仍不住呷蘇枋汁更以糯米為粥入沒藥三錢拌和攤在紙上或絹上封褁損處如骨碎則更須用竹夾定外以紙或衣物包之長安石使君一日謁尹至闤闠中忽有人呼其姓石顧之稠人中不及識明日過市復聞其呼顧其人近在馬後問何以見呼其人曰我無求于人以爾有難特來救爾昨日何以不應石辭謝之欲下馬與語其人止之曰市中非下馬之所禠衣領中出一書授之曰有難則用之稠人中遂引去石歸視之乃此方也石到京師趨朝立馬右掖門外為他馬所踢折足墜地又為馬踏手臂折舁至家屢氣絶急合此藥服旦過半夜痛遂止後手足皆完復石子為朝官知名關中人往往聞此事熙寧中府界教保甲時四方館使劉君提舉每有墜馬或擊刺所傷皆與藥用之即瘥好事者欲其方賂主方者竊得止有兩物而無當歸湯悉同後豫見兩浙提點刑獄使者云親得其方于石君恐保甲主方者隱其一味耳筋斷須續者旋覆根絞汁以筋相對取汁塗而封之即相續如故蜀兒如逃走多刻筋以此續之百不失一治骨鯁或竹木簽刺喉中不下右臘月取鯇魚膽懸北簷下令乾有鯁即取一皂角子再以酒一合煎化溫啜若得逆便吐骨即隨出若未吐更飲以吐為度雖鯁在腹中日久疼痛黃瘦甚者服之皆出若卒求鯇魚不得蠡魚鱖魚鯽魚皆可然不及鯇魚膽臘月收者最佳常有邏卒食雞鯁在腹中常楚痛但食粥每食即如錐刺如是半年支離幾死杖而後能起與此一服大吐覺有一物自口出視之乃雞骨首鋭如刺其尾為飲食所磨瑩滑如珠治諸鯁以木炭皮為細末研令極細如無炭皮堅炭亦可粥飲調下二錢日四五服以鯁下為度此法人家皆用豫在漢東乃目覩其神有劉晦士人鄰家一兒誤吞一錢以此飲之下一物如大烏梅剖之乃炭末裹一錢也池州徐使君極寶此方數數用之未有不效者近歲纍有人言得此方之效不復悉載火燒瘡方北夢瑣言記云孫光憲家人作煎餅一婢抱孩子擁爐不覺落火之上遽以醋泥傅之至曉不痛亦無瘢痕定知俗説亦不厭多聞毒蛇所傷方朝野僉載記用艾炷當囓處炙之引去其毒氣即瘥其餘惡蟲所螫馬汗入瘡用之亦效蘇沈良方卷七
