  text: 欽定四庫全書子部五
  hash: sha256:385bc2d94867d1b606f43bb11ebdc68a3a5579aafe48be2b02b9eb652717f689
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0020_WYG_000-1a, image: WYG0738/WYG0738-0217a.png}
body:
  text: 蘇沈良法醫家類提要臣等謹案蘇沈良方八卷宋沈括所集方書而後人又以蘇軾之説附之者也考宋史藝文志有括靈苑方二十卷良方十卷而别出蘇沈良方十五卷注云沈括蘇軾所著陳振孫書録觧題有蘇沈良方十卷而無沈存中良方尤袤遂初堂書目亦同晁公武讀書志則二書並列而於沈存中良方下云或以蘇子瞻論醫藥襍説附之蘇沈良方下亦云括集得效方成一書後人附益以蘇軾醫學襍説葢晁氏所載良方即括之原本其云或以蘇子瞻論醫藥襍説附之者即指蘇沈良方由其書初尚並行故晁氏兩載其後附蘇説者盛行原本遂㣲故尤氏陳氏遂不載其原本今永樂大典載有蘇沈良方原序一卷亦括一人所作且自言予所作良方云云無一字及軾是亦後人増附之後併其標題追改也案明晁瑮寳文堂書目有蘇沈二内翰良方一部是正嘉以前𫝊本未絶其後不知何時散佚今據永樂大典所載掇拾編次釐為八卷史稱括於醫藥卜算無所不通皆有所論著今所𫝊括夢溪筆談末為藥議一卷於形状性味真偽同異辨别尤精軾襍著時言醫理於是事亦頗究心葢方藥之事術家能習其技而不能知其所以然儒者能明其理而又往往未經試驗此書以經效之方而集於博通物理之手固宜非他方所及矣乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序予嘗論治病有五難辨疾治疾飲藥處方别藥此五也今之視疾者惟候氣口六脈而已古之人視疾必詧其聲音顔色舉動膚理情性嗜好問其所為攷其所行已得其大半而又徧診人迎氣口十二動脈疾發于五藏則五色為之應五聲為之變五味為之偏十二脈為之動求之如此其詳然而猶懼失之此辨疾之難一也今之治疾者以一二藥書其服餌之節授之而已古以治疾者先知陰陽運歴之變故山林川澤之竅發而又視其人老少肥瘠貴賤居養性術好惡憂喜勞逸順其所宜違其所不宜或藥或火或刺或砭或湯或液矯昜其故常捭摩其性理擣而索之投幾順變間不容髮而又調其衣服理其飲食異其居處因其情變或治以天或治以人五運六氣冬寒夏暑暘雨電雹鬼靈厭蠱甘苦寒溫之節後先勝復之用此天理也盛衰强弱五臟異稟循其所同詧其所偏不以此形彼亦不以一人例衆人此人事也言不能傳之于書亦不能喻之于口其精過于承蜩其察甚于刻棘目不捨色耳不捨聲手不釋脈猶懼其差也授藥遂去而希其十全不其難哉此治疾之難二也古之飲藥者煑煉有節飲啜有宜藥有可以久煑有不可以久煑者有宜熾火有宜溫火者此煑煉之節也宜溫宜寒或緩或速或乘飲食喜怒而飲食喜怒為用者有違飲食喜怒而飲食喜怒為敵者此飲啜之宜也而水泉有美惡操藥之人有勤惰如此而責藥之不效者非藥之罪也此服藥之難三也藥之單用為易知藥之複用為難知世之處方者以一藥為不足又以衆藥益之殊不知藥之有相使者相反者有相合而性易者方書雖有使佐畏惡之性而古人所未言人情所不測者庸可盡哉如酒于人有飲之踰石而不亂者有濡吻則顚眩者漆之于人有終日摶漉而無害者有觸之則瘡爛者焉知藥之于人無似此之異者此禀賦之異也南人食猪魚以生北人食猪魚以病此風氣之異也水銀得硫黄而赤如丹得礬石而白如雪人之欲酸者無過于醋矣以醋爲未足又益之以橙二酸相濟宜其甚酸而反甘巴荳善利也以巴荳之利為未足而又益之以大黄則其利反折蟹與柿嘗食之而無害也二物相遇不旋踵而嘔此色為易見味為易知而嘔利為大變故人人知之至于相合而知他藏致他疾者庸可易知耶如乳石之忌參术觸者多死至于五石㪚則皆用參术此古人處方之妙而世或未喻也此處方之難四也醫誠藝也方誠善也用之中節也而藥或非良奈何哉橘過江而為枳麥得濕而為蛾雞踰嶺而黑鸜鵒踰嶺而白月虧而蚌蛤消露下而蚊喙坼此形器之易知者也性豈獨不然乎予觀越人藝茶畦稻一溝一隴之異逺不能數歩則色味頓殊況藥之所生秦越燕楚之相逺而又有山澤膏瘠燥濕之異禀豈能物物盡其所宜又素問説陽明在天則花實戕氣少陽在泉則金石失理如此之論採掇者固未嘗晰也抑又取之有早晩藏之有焙㫰風雨燥濕動有槁暴今之處藥或有惡火者必日之而後咀然安知採藏之家不常烘煜哉又不能必此辨藥之難五也此五者大概而已其微至于言不能宣其詳至于書不能載豈庸庸之人而可以易言醫哉予治方最久有方之良者輒為疏之世之為方者稱其治效常喜過實千金肘後之類尤多溢言使人不復敢信予所謂良方者必目覩其驗始著于篇聞不預也然人之疾如向所謂五難者方豈能必良哉一覩其驗即謂之良殆不異乎刻舟以求遺劒者予所以詳著其状于方尾疾有相似者庻幾偶値云爾篇無次序隨得隨註隨以與人拯道貴速故不暇待完也沈括序
