body:
  text: 蘇沈良方卷四宋蘇軾沈括撰治消渇方眉山有楊潁臣者長七尺健飲啖倜儻人也忽得消渇疾日飲水數斗食倍常而數溺服消渇藥逾年疾日甚自度必死治棺衾囑其子于人蜀有良醫張元𨼆之子不記其名為診脈笑曰君幾誤死矣取麝香當門子以酒濡之作十許丸取枳枸子為湯飲之遂愈問其故張生言消渇消中皆脾衰而腎敗土不能勝水腎液不上泝乃成此疾今診潁臣脾派極熱而腎不衰當由果實酒過度虚熱在脾故飲食兼人而多飲水既多不得不多溺也非消渇也麝香能敗酒𤓰果近輒不植而枳枸子亦能勝酒屋外有此木屋中醸酒不熟以其木為屋其下亦不可醸酒故以此二物為藥以去酒果之毒也宋玉云枳枸來巢枳音句里切枸音矩以其實如鳥乳故能來巢今俗譌謂之雞距子亦謂之癩漢指頭蓋取其似也嚼之如乳小兒喜食之木香散治臟腑冷極及久冷傷􅉵口瘡下泄榖米不化飲食無味肌肉瘦顇心多嗔恚婦人産後虚冷下泄一切水泄冷痢木香破故紙髙良姜砂仁厚朴姜汁炙各三分赤芍藥陳橘紅肉桂白术各半兩胡椒吳茱茰湯洗去黒水各一分肉荳􅅳四枚㯽榔一箇右為散每服三錢不經水猪肝四兩許去筋膜㓟為薄片重重摻藥置一鼎中入漿水一碗醋一茶脚許蓋覆煑肝熟入鹽一錢蔥白三莖細切生姜彈子許槌碎同煑水欲盡空心為一服冷食之初服㣲㵼不妨此是逐下冷氣少時自止經年冷痢滑㵼只是一服渇即飲粥湯下忌生冷油膩物如不能食冷即少添漿水暖服張簡夫職方嘗久瀉忽有人召食以疾辭不徃主人曰吾有良藥一服可瘥煑藥而召之簡至先服藥便就席熟醉而歸竟不復㵼簡夫得此方與人服莫不神應嘉興謝醫得此方惡其煩只用漿水煑猪肝為丸如桐子大每服五十丸粥飲下其效亦同若暴瀉痢只是一服唯熱痢熱瀉不住須加服硇砂煎丸治一切積滯化氣消食補益真氣産後逐敗血補虚損至善硇砂揀通明無石者别研令如粉當歸無灰酒浸一宿去蘆切薄片子焙肉蓯蓉無灰酒浸一宿薄切作片子乾秤穿心巴㦸無灰酒浸一宿去心用㯽榔黑附子天雄用無灰酒煑五七百沸候軟刮去皮木香沈香舶上茴香微炒一以上各兩金鈴子三兩洗過切破四靣無灰酒浸一宿候軟以刀子刮下瓤去皮核不用阿魏半兩米醋磨成膏八諸藥右為細末以無灰酒煑白麫糊丸如桐子大毎服三十丸空心日午溫酒下此方家家有予家婦嘗病蓐中下痢日久甚困篤百方不瘥士人李潛善醫曰蓐中下痢與他痢不同常痢可用苦澁藥止之蓐中痢生于血不足投澁藥則血愈不行痢當更甚為予作硇炒法云此藥最能治産後痢先以桂圓方小下之次投硇砂丸日九十丸痢頓減半次日遂愈硇砂丸産後雖無疾亦宜服之能養血去積滯桂圓方今附于後硇砂研肉桂甘遂巴荳去心皮勿去油丁香木香莞花醋炒焦右等分擣治麫糊為圓小菉荳大每服二圓三圓溫水下加減更量虚實潛名醫也云此圓取積最勝不論久近皆能化黑神丸漆六兩半生半用重湯煑半日令香神麴茴香各四兩木香椒紅丁香各半兩㯽榔四枚除椒外五物皆半生半炒右圓如彈丸取茴香末十二兩鋪蓋陰地廕乾候外乾并茴香收器中極乾乃去茴香腎餘育腸膀胱痃癖七疝下墜五隔血崩産後諸血漏下白赤並圓分四服死胎一圓皆無灰酒下難産炒葵子四十九枚擣碎酒煎下一圓諸疾不過三服元氣十服案此句疑有脱字隔氣癥癖五服血瘕三圓當瘥予族子婦病腹中有大塊如杯每發痛不可堪時子婦已貴京下善醫者悉投方莫愈陳應之曰此血瘕也投黑神丸盡三圓杯氣消盡終身不復作神保丸木香胡椒各一分巴荳十枚去皮心研乾蝎七枚右湯釋蒸餅丸麻子大朱砂為衣每服三丸心膈痛柿蔕燈心湯下腹痛柿蔕煨姜煎湯下血痛炒姜醋下小便不通燈心湯下血痢臟毒楮葉湯下肺氣甚者白礬蚌粉各三分黄丹一分同研為散煎桑根白皮糯米飲調下三錢小喘止用桑皮糯飲下腎氣脅下痛茴香酒下大便不通蜜湯調㯽榔末一錢下氣噎木香湯下宿食不消茶酒漿飲任下予三十年前客金陵醫人王琪傳此方琪云諸氣惟膀胱氣脅下痛最難治獨此丸輒能去之熙寧中予病項筋痛諸醫皆以為風治之數月不瘥乃流入背膂久之又注右脅攣痛甚苦憶琪語方向已編入靈苑取讀之有此一驗乃合服之一投而瘥後嘗再發又一投而瘥小建中湯治腹中切痛官桂生姜切分各三甘草炙半兩大棗十二枚擘白芍藥一兩半膠飴二兩右以水二升煑取九合去滓内飴更上火㣲煑令化溫服三合日三服嘗有人患心腹切痛不可忍累用良醫治之相不效炙十餘處亦不瘥士人陳丞善醫投一藥遂定問之乃小建中湯也此藥偏治腹中虚寒補血尤止腹痛常人見其藥性温平未必信之古人補虚止用此體靣藥不須附子硫黄丞用此藥治腹痛如神然腹痛按之便痛重按却不甚痛不可是氣痛重按愈而堅堅者當自有積也氣痛不可下下之愈痛此虚寒證也此藥尤相當按外臺虚勞腹中痛夢失精四肢酸痛手足煩熱咽乾口燥婦人少腹痛宜服張仲景傷寒論陽脈濇陰脈弦法當腹中急痛先與此不差者小柴胡湯主之此二藥皆主腹痛予已于小柴胡湯叙之若作散即每服五錢匕生姜五片􅀥三箇大者飴一栗火者若疾勢盛須作湯劑散服恐力不勝病元豐中丞相王郇公病少腹痛不止宣差太醫攻治備至皆不效丸藥之至熱如附子硫黄五夜乂丸之類用之亦不瘥附馬張都尉令取婦人油頭髪燒為灰細研篩過溫酒服二錢即時痛止婦人用男子頭髪如前類用方進食散青皮陳皮去瓤甘草炙肉桂去外皮髙良姜薄切炒分各一川烏頭一箇泡去皮臍草荳􅅳三箇訶子煨去核五箇右每服一錢水一中盞生姜二片煎七分食空時服此廬州李潛方治脾胃虚冷不思食及久病人脾虚全不食者只一二服便頓能食潛名醫也予目見在真州治賈使君女子已五十餘日病脾多嘔不進食久醫絶無驗潛投此藥一服遂食蒸餅半枚明日百味皆思潛云此藥進食極神速余疑此藥太熱潛云不然用之三十年無不效也壓氣散止逆定喘治氣乏控上膈者木香人參白茯苓藿香陳橘皮枳殻附子炮甘草炙等已上各分右一大盞煎紫蘓木瓜生姜湯再入銀盞重湯煎五七沸通口服訶子丸消食化氣訶子皮三兩洗泡木香白荳􅅳㯽榔桂人參乾姜茯苓各二兩甘草粗大者炙牽牛子略炒兩各一右酒煑麫糊為丸桐子大每服十五丸至二十丸如有氣疾發動喫食過多築心满悶爛嚼茶酒任下陸子履學士知蔡州平輿縣值石普南遷子履傳此方普啖物極多常致憒悶成疾服此輒愈予問子履求得之家中常合食飽脹滿及氣膨胸膈只一服如人手按下極有驗也椒朴丸治脾胃虚冷歳久不思飲食或發虚腫或日漸羸瘦四肢衰倦吐痢無節一應脾虚候狀皆可服漢椒去目厚朴去麄皮剉茴香青鹽淘去沙土取浄右各二兩以水二升煑令乾焙燥擣為末麫糊丸如桐子大每服三四十丸空心溫米飲及鹽湯下病深者日三服予中表許君病脾逾年通身黄腫不能起全不嗜食其甥為本道轉運使日遣良醫治之不效有傅主簿傳此方服十許日漸安自爾常服肌膚充碩嗜飲食年六十餘日行數十里强力如少年椒朴丸博濟及諸集中多載有加附子者有加姜皮者皆不快㨗此方得其精要與病相當如神慎勿増他藥以致不驗無礙丸此丸傳自湖州處士劉某其叔父病喘手足皆腫殆不能起劉君夢神謂之曰君叔父病脾病横泄四肢非他也子有隠徳吾能愈之乃疏方授之曰無礙丸且戒勿服他藥劉君得方以餌其叔父三餌而疾間君先迎醫于錢塘後數日醫至曰此肺逆當治肺藥入口疾復作君諭曰神人預嘗戒我急謝醫復投無礙丸遂瘥大腹皮炙二兩蓬莪术三稜皆濕紙裹煨熟一兩㯽榔生一分木香麫裹煨熟半兩右為末炒麥蘖擣粉為糊丸如桐子大每服二十丸生姜湯下陰陽二勝散治久患翻胃及小兒驚吐諸吐好硫黄半兩細研水銀一分與硫黄研無星右同研如黑煤色每服三錢生姜四兩取汁酒一盞同姜汁煎熟調藥空心服衣被蓋覆當俟足指間汗出迤邐遍身汗出即差常有人病翻胃輒吐出午後即發經三年不瘥國醫如孫兆輩皆治療無驗消羸殆盡有守庫卒季吉者見之曰此易治也一服可瘥始都不信一日試令合藥如法服之汗出皆如膠腥穢不可近當日更不復吐遂瘥楚人田醫善治小兒諸吐亦用此藥量兒長少服一錢至一字冷水調下吐立定此散極浮難調須先滴少水以至緩緩研殺稍稍増湯使令調和若頓入湯酒盡浮泛不可服又予舊官属陳宣徳之妻病翻胃亦彌年得一烏頭散服之一服差又楚人孫生有一茱茰丸亦療翻胃其人自有傳今皆附于此予校此三方惟田季有陰陽理故自勝㨗烏頭茱茰二方皆性熱用者量其臟寒温投之烏頭散烏頭三兩炮去皮川楝子一兩半檳榔木香各一兩右為末每服二錢水一盞煎至七分鹽一捻溫服茱茰丸孫生傳曰年深膈氣翻胃飲食之物至晚皆吐出悉皆生存不化膈上常有痰涎時時嘔血胸中多酸水吐清水無時日漸羸瘦腹中痛楚時復冷滑或即閉結候牀不可盡􅄒自患此疾六年百方無驗因遇此法服及兩月諸疾悉瘥嘗願流傳救人具方如左呉茱茰三分瓦上出油胡椒人參當歸各五錢甘草半兩一半生一半紙裹五七重酸浸令透火内慢煨乾再浸如此七遍半夏一兩用姜四兩研汁入砂礶子内用姜汁井水煑候破㸔存二分自心取半夏研為膏子半兩炒乾存性一分右為末半夏膏丸如稍硬添姜汁丸如桐子大每服七丸桑柳條各三十莖上等銀器内煎湯吞下日三服忌諸毒物惟可食油猪胰脾軟飯此孫生自叙如此治噎方廣五行記治噎疾永徽中絳州有僧病噎數年臨死遺命令破喉視之得一物似魚而有兩頭徧體悉是肉鱗致鉢中跳躍不止時寺中刈藍作淀試取少淀致鉢中此蟲繞鉢畏避須㬰蟲化成水世人以淀治噎疾始此張果醫説病噎吐蛇華佗行道見一人病噎嗜食而不得下家人車載欲徃就醫佗聞其呻吟駐車徃視語之曰向來道傍有賣餅家蒜虀大酢從取三升飲之病自當差即如佗言立吐蛇一條懸之車邊欲造佗佗尚未還佗家小兒戯門迎見自相謂曰客車邊有物必是是我公也疾者前入見佗壁北懸此蛇輩以十數食飴至噎呉廷紹為太醫令烈祖因食飴喉中噎國醫皆莫能愈廷紹尚未知名獨謂當進楮食湯一服疾失去羣醫默識之日取用皆不驗或扣之答曰噎因甘起故以楮實湯治之槐花散治熱吐皂角去皮燒烟絶白礬熬沸定槐花炒黄黒色甘草炙右等分為末每服二錢白湯調下嘉興李使君曾病嘔每食訖輒吐如此兩月服翻胃藥愈甚或謂有痰飲投半夏散服之亦皆不驗幕下樂判官授此服之即時瘥又有一老青衣久病嘔與服之又瘥大凡吐多是膈熱熱且生痰此藥能化胃膈熱涎特有殊效紫粉丸治吐針沙醋浸一夜劈破便帶醋炒直候銚子紅色無煙乃止候冷細研更用醋團火燒洞赤取候冷再研極細麫糊丸如桐子大每服四十丸粥飲下服訖便啜一盞許粥已不吐如未定再服決定小兒小丸之隨兒大小與此藥極神異然吐有多端良方中有數法皆累驗者可參用之軟紅丸止吐辰砂信砒强分各五胭脂一錢巴豆取霜七箇右鎔蠟少許入油三兩滴和藥為劑以油單裹之大人如菉豆小兒如芥子濃煎槐花甘草湯放溫下一丸忌熱食此藥燎人吐只一服止嘗與人一丸偶兩人病分與兩人服兩人皆愈酒磨丸治吐逆粥藥不下者万俟迹中濟急經驗單用生姜丸彈子大服法同五靈脂狗膽汁和丸如鷄頭實大每服一枚煎熱生姜酒磨化再湯令極熱先煑溫粥半升持在手令病人乘藥熱頓飲以粥送下蘓沈良方卷四
