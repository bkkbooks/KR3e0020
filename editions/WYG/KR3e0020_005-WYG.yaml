body:
  text: 蘇沈良方巻五宋蘇軾沈括撰桂香散治脾胃虚弱并婦人脾血乆冷髙良薑剉炒香熟草荳䓻甘草白术縮砂肉厚朴去麄皮剉各一兩青橘皮去瓤炒黄訶子肉各半兩肉桂一分生薑切棗肉各一兩碗二味同厚朴一處用水一煮令乾同杵為團焙乾用右同為末毎服二錢入鹽少許沸湯㸃空心服此藥偏療腹痛天台吕使君自來有腹痛疾發即悶絶連日不差有一道士㸃此散飲之一服遂定自後每發即飲數服痛如失去予得之累與人服莫不神驗治冷㵼尤妙腹痛最難得藥此方只是温脾藥耳特工止痛理不可知引氣丹理一切滯氣硃砂研安息香研麝香研分各一白芥子三百六十粒炒大㦸末一錢匕牛黄半錢研入牽牛末一錢匕五靈脂研入乳香研入沒藥研入各一錢班猫二十七箇去翅頭足研入巴豆二七粒研出油不出油助使快右件都研令匀用紅米飯為丸如麻子臨時湯下之太醫潘璟帶囊中常貯此藥倉猝疾多用之沈麝丸治一切氣痛不可忍沒藥辰砂血竭麝香沈香各一兩木香半兩右皆生用銀磁器熬生甘草膏丸皂莢子大薑鹽湯嚼下血氣醋湯嚼下松滋令萬君擬寳此藥婦人血痛不可忍者只一丸萬君神秘之毎有人病止肯與半丸徃徃亦差礞石丸治諸痰硇砂一兩米醋三升化巴荳霜二兩半煑以上先青礞石半兩研三稜一兩醋浸一宿煨以上次煑大黄一兩半分三分煨炒又次煎木香㯽榔肉荳䓻猪牙皁角去皮炒一云炙肉桂乾薑炮丁香蓬莪术各一兩芫花醋浸一宿炒㣲有烟青橘皮白荳䓻墨燒八分過各半兩胡椒粉霜研各一分麫二兩酒半觔化又次煎以硇砂醋合巴豆煑兩食久投礞石三稜又投酒麫又投大黄相去皆半食乆乃入衆藥熬圓菉豆大毎服三五圓酒飲雜下凡癥積飲食所傷氣凝糓食不化皆能愈褐丸消食化氣止泄㵼腹中諸冷疾烏頭炮去皮桂香附子微炒乾薑炮陳橘皮微炒右先用川巴豆取肉麻油内慢火煎自旦及午候巴豆如皁子色即止淨拭冷水中浸兩日日再換水又拭乾研如油極細須研一日方可用以鐵匙刮起薄攤新瓦上如一重紙厚候一伏時以鐵匙刮下再研極細每巴豆霜一兩即諸藥各五兩為細末水調成膏與巴豆同研千萬匝再用絹羅過更研令匀用陳米一升半為細末水調成膏直候微酸臭即煑為硬糊細研令無塊硬處乃與衆藥為丸如菉豆大毎服五七丸隨湯使下此只是食藥然食藥方至多無如此方者能和脾消氣進食止㵼去積凡食物壅隘服之即消腹中不平脾胃諸疾服之莫不康泰蘇州有人賣一朱砂丸食藥無所不治其效如神以此致巨冨服其藥者徧天下人無有得其真方者後有親人竊得乃與此一同但加朱砂為衣耳人家冝常合長少皆可服神聖香薷散治胃氣虚霍亂吐㵼轉筋腹痛原注出呉兢五臟論香薷穗經霜者一兩半新厚朴取心川黄連各二兩白扁豆一兩焙右先用薑汁四兩一處杵黄連厚朴二味令細炒成黒色入香薷扁荳二味都為末毎服五錢水一盞酒一盞共煎至一盞入磁瓶内蠟紙封沈入井底候極冷一併服二服至死者亦活京師有人賣此藥一服三百錢治腹中氣塊方大黄蓽撥等分生用右蜜丸梧子大麝香水下二三十丸空心服日三服貴州守李承議得嵐瘴夫婦兒女數人相繼而死有二子歸嶺北皆病腹中有塊如𤓰瘦若欲死陳應之與此方服及三十服氣塊皆消應之云此寒熱相雜所當以寒熱二物攻之梔子湯治胸痺切痛梔子二兩附子一兩炮右毎服三錢水一大盞薤白三寸同煎至五分温服泗州有人病嵗餘百方不效服此二服頓愈蘇合香丸治肺痿客忤鬼氣𫝊屍伏連硽殜等疾又治心痛霍亂吐痢及諸瘧瘀血月閉痃癖丁腫驚癎邪氣狐媚瘴癘等疾蘇合香白术硃砂沉香訶子肉丁香木香香附子白檀香乳香蓽撥烏犀屑安息香各一兩麝香龍腦各半兩右為末煉蜜丸如鷄頭實大毎服一丸温酒嚼下人參湯亦得此方人家皆有恐未知其神驗耳本出廣濟方謂之白术丸後人編入外臺千金等方真宗朝嘗出蘇合香酒賜近臣又賜蘇合香丸自此方盛行于世此藥大能安氣血郤外邪凡疾自内作不曉其名者服此徃徃得效惟治氣疰氣厥氣逆氣不和吐痢榮衛阻塞尤有神功予所親見者嘗有淮南監司官謝執方因嘔血甚乆遂奄奄而絶計無所出惟研蘇合香丸灌之盡半兩遂蘇又有一船工病傷寒日乆而死但心尚暖不忍棄而不救試與蘇合香丸灌之四丸乃省遂瘥又友人為兩浙提㸃刑獄嘗病大㵼目視天地皆轉諸藥不效服蘇合香兩丸頓覺輕爽腹㵼亦止予目覩救人于將絶者不可勝計人家不可無此藥以備急難瘟疫時服之尤驗倉猝求人參不得只白湯亦佳勿用酒古方雖云用酒下多不效切冝記之東陽劉使君少時嘗病瘵日漸羸削至于骨立肌熱盜汗不止人有勸服此藥凡八九兩即瘥一方有牛黄半兩古方無之乃後人加也明月丹治諸癆屎四十九枚碙砂如兔屎相類大者四十九枚右用生蜜為丸以生甘草半兩碎浸一夜取汁五更初下七丸勿令病人知之藥下後頻看若有蟲急打殺以桑火油煎使焦棄惡水中三日不下更服須月三日以後望前服之忌見䘮服色衣婦人猫犬之類後服治癆補氣藥取瘥威愍孫元規藏此方數能活人江隂萬融病癆四體如焚垂困一夜夢神腹擁一月大如盤明爛不可正視逼人心骨皆寒已而悸寤俄有人扣闗乃威愍使人遺之藥服之遂瘥問其名則明月丹也始悟向之所夢大抵此藥最治熱癆又云傷寒煩燥骨熱皆治火角法治乆冷痰咳𠻳及癆𠻳服藥無效者雄黄通明不夾石者一兩雌黄不夾石者半兩二味同研極細蠟三兩右先鎔蠟令冷下藥末攬匀候凝刮下用紙三五段每段闊五寸長一尺鎔藥蠟塗其一面令厚以竹箭巻成筒子令有藥在裏幹令相著乃抜去箭臨臥熨斗内盛火燃筒子一頭令有烟乃就筒子長引氣吸取烟陳米飲送下又吸毎三吸為一節當大咳咯出冷涎即以衣覆臥良乆汗出若病三五年者二三吸即瘥十年以上瘦甚咳聲不絶胸中常有冷痰服藥寒温補㵼俱無效者日一為之不過五七日良愈先君病痰𠻳胸中常如冰雪三年而伯父繼感𠻳又六年羸瘵殆困百方治之皆莫愈用此二三為之皆瘥九寳散治積年肺氣大腹并皮肉桂甘草炙乾紫蘇杏仁去皮尖桑白皮各一兩麻黄去根陳橘皮炒乾薄荷各二兩右𢷬為麄末毎服十錢匕用水一大盞童子小便半盞烏梅兩箇薑錢五片同煎至一中盞濾去滓食後臨臥服兩浙張大夫病喘二十年毎至秋冬輒劇不可坐百方不差後得臨平僧法本方服之遂瘥法本凡病喘三十年服此藥半年乃愈永不復發凡復此藥須乆乃效何首烏散治脚氣流疰頭目昏重肢節痛手足冷重熱拘攣浮腫麻痺目生黒花何首烏水浸一日切厚半寸黑豆水拌匀令濕何首烏重重相間蒸豆爛去豆隂乾仙靈脾葉牛膝以上各酒浸一宿烏頭水浸七日入鹽二兩半炒黄色以上各半觔右毎服二錢酒下或粥飲調下日三服空心食前乆患者半月效先君同官王綽有女子病足攣痛二嵗得此方半月愈予老姨亦病手足骨髓中痛不能堪乆治不瘥亦得此愈經效阿膠方治𠻳并𠻳血唾血阿膠剉碎㣲炒卷柏去塵土生乾地黄乾山藥大薊獨根者更佳曰影乾五味子淨兩各一柏子别研茯苓百部逺志去心錢各五右擇好藥材依方修製𢷬羅為末煉蜜丸如彈子大不拘時候用濃煎小麥并麥門冬湯嚼下半丸加至一丸若覺氣虚空心不用服炙咳送法予族中有病霍亂吐痢垂困忽發咳逆半日之間遂至危殆一客云有炙咳逆法凡傷寒乆疾得咳逆皆為惡候投藥皆不效者炙之必愈予遂令炙之火至肌咳逆已定元豐中予為鄜延經畧使有幕官張平序傷寒已困一日官屬㑹飲通判延州陳平裕忽言張平序已屬纊求往見之予問何遽至此云咳逆甚氣已不屬予忽記炙法試令炙之未食項平裕復來喜笑曰一炙遂瘥其法乳下一指許正與乳相直骨間陷中婦人即屈乳頭度之乳頭齊處是穴艾炷如小荳許炙三壯男炙左女炙右只一處火到肌即瘥若不瘥則多不救矣𦍑活散止咳逆案三困方有丁香一兩𦍑活附子炮茴香微炒兩各半木香乾薑炮去土各一兩右毎服二錢水一盞鹽一捻同煎一二十沸帶熱服一服止治肺喘方蒲頽葉㣲似棠葉尤柔厚背白似熟羊皮經冬不凋花正如丁香蒂極細如絲倒懸之風吹則搖搖然冬末生花至春乃敷實一如山茱茰味酸可啖與麥齊熟其木甚大呉人名半含江南名棠京師名紙錢毬襄漢名黄婆嬭右一物為末毎服二錢或温水調下發時服有患喘三十年者服之皆愈疾甚者服後胷上生小癮􅇙痒者其疾即瘥一方用人參等分硃砂膏鎮心安神解熱及損𠻳血等疾硃砂别細研生犀玳瑁真珠末蘇合香用油和藥亦可銖艷粉各一兩牛黄麝香生腦子硼砂琥珀别研羚羊角安息香酒蒸去砂石别研入藥各半兩金末一分用箔子研新羅人參甘草微炒兩各一逺志去心茯苓各半兩同參以下四味𢷬右都為細末拌和煉蜜破蘇合油劑諸藥為小錠子更以金箔裹之磁器内蜜封毎用一皁子大食後含丸衛尉葉丞得效并阿膠丸相雜服此藥治血安神更勝至寳丹蘂珠丹鎮心空膈去八邪氣及婦人血攻寒熱等疾但驚憂成病皆主之辰砂一兩一分鳯尾草一握水研汁煑砂一食乆水洗乾研桃仁四十九枚生牛黄一分附子一分半紙裹煨安息香一分蜜一分酒少許煑成膏麝香二錢阿魏薄切微焙木香各半兩右丸如豆大五七至十圓婦人桃仁醋湯下丈夫桃仁鹽湯下侍郎簡之妻因悲憂病腹中有兩塊皆如拳毎相衝擊則悶絶堅不可破臥嵗餘服此藥兩塊皆失所在至寳丹本池州醫鄭感慶歴中為予處此方以其屢效遂編入靈苑生烏犀生玳瑁琥珀硃砂雄黄各一兩牛黄龍腦麝香各一分安息香一兩半酒浸重陽煑令化濾去滓約取一兩淨金箔五十片右丸如皁子大人參湯下一丸小兒量減舊說主疾甚多此丸専療心熱血凝心膽虚弱喜驚多涎眠中驚魘小兒驚熱女子憂勞血滯血厥産後心虚怔忪尤效血病生薑小便化下蘇沈良方卷五
