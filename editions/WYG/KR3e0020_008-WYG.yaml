body:
  text: 蘇沈良方卷八宋蘇軾沈括撰朱賁琥珀散治婦人血風勞琥珀沒藥木香當歸芍藥白芷羌活乾地黄延胡索川芎各半兩土𤓰根丹皮白朮桂各一兩右件為末毎服二錢水一盞煎至七分益酒三分復煎少時并滓熱服重疾數服則知效麥煎散治少男室女骨蒸婦人血風攻汪四肢心胸煩壅鼈甲醋炙大黄濕紙裹煨熱常山柴胡赤茯苓當歸酒浸一宿乾漆白术生乾地黄石膏各一兩甘草半兩右毎服二錢小麥五十粒水一盞煎至六分食後卧時温服有虚汗加麻黄根一兩此黄州吳官方療骨熱黄瘦口臭肌熱盜汗極效麥煎散甚多此方吳君寳之如希世之至珍其效可知白术散治婦人姙娠傷寒白术黄芩等分新瓦上同炒香右為㪚每服三錢水一中盞生薑三片大􅀥一箇擘破同煎至七分温服但覺頭發熱便可服三二服即瘥惟四肢厥冷隂症者未可服此方本常州一士賣此藥醫工皆論觔售去行醫用之如神無人得其方予自得此治疾無有不效者仍安胎益母子肉桂散治産後衆疾血氣崩暈腫滿發狂瀉痢寒熱等惟瀉而吐者難瘥黑豆炒熟去皮二兩肉桂當歸酒浸芍藥乾薑炮乾地黄甘草蒲黄各一兩右温酒調下二錢日三服疾甚者三服瘥無疾日二服七日止大黄散治産後血暈及傷折内損婦人血癥血瘕羊脛炭燒赤酒淬十五兩大黄小便浸七日旦易日足濕紙裹煨熟切焙巴荳肉漿水煮黄色焙各三兩半半兩錢燒赤米醋淬為粉新水措過取細者二兩一分右和研一日每服半錢當歸一分便煎濃稍温調下産後血暈百病且當逐血者至甚乃服口噤者斡開灌下後識人更一服累經生産有血積癥癖塊及敗血風勞寒熱諸疾當下如爛猪肝片永無他疾墜擊内損當歸酒下一字有某墜下折脅當折處陷入肌中痛不可忍服此藥如人以手自内拓之筋骨遂平澤蘭散治婦人産乳百疾安胎調氣産後血暈衂血血積虚勞無子有子即墮難産子死腹中胎衣不下血注遍身生瘡經候不調赤白帶下乳生惡核咳嗽寒熱氣攻四肢處女任脈不調等常服益血美飲食使人安健有子澤蘭嫩葉九分石膏八分研當歸赤芍藥川芎㣲炒甘草炙白蕪荑各七分生地黄六分肉桂五分厚朴薑炙桔梗吳茱茰炒卷柏并根防風白茯苓柏子仁細辛各四分人參白芷炒白术米泔浸一宿切麩炒黄色藁本椒紅乾薑炒烏頭炮黄茋五味子各三分白薇丹參阿膠炒各二分右為細末空心熱酒調下二錢予家婦人子女羸弱多疾者服此藥悉瘥治褓中小兒臍風撮口法每視小兒上下齗當口中心處若有白色如紅豆大此病發之候也急以指𤓰正當中搯之自外達内令斷㣲血出亦不妨又于白處兩盡頭亦依此掐令内外斷只掐令氣脈斷不必破肉指爪勿令太銛恐傷兒甚予為河北察訪使日到趙郡有老人來獻此法云篤老惜此法將不𫝊願以濟人詢之趙人云此翁生平手敕千人兒矣環趙數邑人皆就此翁治應手皆愈黒神丸治小兒急驚慢驚風膩粉一錢半墨土白麫蘆薈炙錢各一麝香龍腦牛黄青黛使君子去殻麫裹煨熟各五分右麫和丸梧桐子大每服半丸薄荷湯研下要痢即服一丸楚州小兒醫王鑑賣此藥致厚産鑑神之未嘗𫝊人予得之乃常人家睡驚丸小不同耳治驚風極效前後用之垂死兒一服即瘥青金丹治小兒諸風諸疳諸痢青黛三分研雄黄研胡黄連各二分硃砂研膩粉熊膽温水化白附子蘆薈研分各一麝香研半分蟾酥水銀各皁子水鉛霜龍腦各一字右同入乳鉢内再研令勻用豶豬膽一箇取汁熬過浸蒸餅少許為丸黄米大曝乾一嵗可服二丸量兒大小増之驚風諸癎先以一丸温水化滴鼻中令􅅉戴目者當自下瘛瘲亦定更用薄荷湯下諸疳粥飲下變蒸寒熱薄荷湯下諸瀉痢米飲下疳蚘咬心苦棟子煎湯下鼻下赤爛口齒疳蟲口瘡等乳汁研塗病疳眼雀目白羊子肝一杖竹㓟開納藥肝中以麻縷纒米泔煮令熱空腹服乳母常忌毒魚大蒜雞鴨猪肉此丸療小兒諸疳至良予目見小兒病疳瘠盡但粗有氣服此或下蟲數合無不即瘥而肥壯無疾幾能再生小兒也桔梗散治小兒風熱及傷寒時氣瘡疹發熱等症桔梗細辛人參白术括􅌣根甘草炙白茯苓芎藭右等分為末毎服二錢水一盞薄荷二葉同煎七分三嵗已下兒作四五服五嵗已上分二服予家常作此藥凡小兒發熱不問傷寒風熱先與此散服往往輒愈兼服小黒膏尤善此桔梗散與活人書方同名惺惺散孔氏家𫝊云惺惺散加鈎藤蟬蜕與小兒喫甚妙理上壅風熱小黒膏治小兒傷寒風癎烏頭天南星大者燒通赤入小瓶内濕紙宻口令火滅取刮之中心存白處如皁莢子大為度須燒數枚擇中度者可用各一枚薄荷元參末錢各五右蜜和葱白湯下荳許頻服筋緩急加乳香同葱白煎湯潤州傅醫賣此藥累千金余家小兒傷寒風發熱與二三丸令小睡及寤則已涼矣治痘瘡欲發及已發而陷伏者皆宜速治不速毒入臟必致困宜服此豬血臘月取瓶盛挂風處令乾右取半􅀥大加龍腦大荳許温酒調下潘醫加菉荳英粉半􅀥塊同研病㣲有即消甚則瘡發亦愈予家小女病傷寒但腹痛晝夜號呼手足厥冷形症極惡肘瘡倒發予疑為醫以藥伏先不畜此藥急就屠家買少生血時盛暑血至已敗惡無可奈何多以龍腦香和灌之一服遂得少睡須㬰一身皆瘡㸃而安不爾幾至不救痘瘡欲無瘢頻掲去勿令隐肌乃不成瘢縱掲傷有㣲血但四面膏塗無苦也瘡痂不可食雞鴨卵食即盲瞳子如卵色其應如神不可不戒也治小兒豌荳瘡入目痛楚恐傷目用浮萍隂乾每服一二錢隨兒大小以羊子肝半箇入盞子内以杖子刺碎爛投水半合絞取汁調下食後服不甚者一服瘥已傷目者十服瘥邢州杜醫用此藥前後效者甚多辰砂丸治小兒驚熱多涎痰瘧久痢吐乳午後發熱驚癎等疾辰砂粉霜膩粉各一分生龍腦一錢右軟糯米飯為丸菉荳大一歳一丸甘草湯下大人七丸治小兒走馬疳唇齒瘡爛逡巡狼狽用此即瘥砒霜粉霜二物先研極細石灰羅過次研右等分相合左右轉研各千下當極膩如麫每以雞羽尖挑少許掃瘡上其瘡即乾慎勿多用恐入腹中有大毒慎之海州東海縣民家賣此藥每一日只一掃如米許大無不差者麝香散治小兒走馬疳牙齦腐爛惡血口臭牙齒脱落黄連末三錢銅綠麝香各二錢水銀一錢煮􅀥一枚同研右潄口浄以藥傅瘡上蘭香葉覆之内蝕為坎者一傅即生肉牛黄煎治小兒諸疳諸痢食傷氣脹體羸頭大頭髪作穗壯熱不食多困齒爛鼻瘡等疾大蚵蚾一枚去皮骨腹胃炙為末無灰酒一盞豶豬膽一枚同煎成膏訶子炮使君子胡黄連蟬殻不洗墨石子蘆薈蕪荑熊膽硃砂夜明砂雄黄各一分研木香肉荳蔲春夏各半分秋冬各一分牛黄二錢麝香一錢龍腦五分右為丸如麻子大飲下五七丸驚疳金銀薄荷湯下肝疳腹脹桃仁茴香湯下疳蟲東引石榴苦棟根湯下五歳以上十丸此藥尤治疳痢脇熱而痢者不可服吳婆散治小兒疳瀉不止日夜通數不記漸漸羸瘦衆藥不效者黄栢蜜炙黄連微炒桃根白皮蕪荑去皮各一分木香厚朴薑汁炙丁香槟榔各一錢没石子一錢半楝根白皮七分右為末每服一字三歳以上半錢五六歳一錢用紫蘇木𤓰米飲調下乳食前一日三服予家小兒曽有患瀉百餘日瘦但有皮骨百方不瘥有監兵鍾離君見之曰何不服吳婆散立可瘥也予因問吳婆散何藥曰古方也人家多有之乃問求方合與兩三服便效又一孫男亦疳瀉勢甚危困兩服遂定若病深者服一兩日間決瘥此藥若是疳瀉無不驗者藥性稍温暴熱瀉者或不相當寒水石散治小兒之病多因驚則心氣不行鬱而生涎逆為大疾宜服常行小腸去心熱兒自少驚亦不成疾寒水石滑石水研如泔揚去粗者存細者瀝乾更研無聲各三兩甘草一兩生右量兒大小熱月冷水下寒月温水下凡被驚及心熱不可安卧皆與一服加龍腦更良小硃砂丸治小兒驚積鎮心化涎硃砂一分巴荳三十粒去皮膜出盡油半夏湯洗七徧為末炒二錢杏仁五枚炮去皮尖右麫和丸如菉豆大二歳一丸荆芥薄荷湯下三歳二丸五歳三丸如驚伏在内即行盡仍舊藥出如無驚藥更不下妙香丸治小兒虚中積潮熱寒熱心腹脹滿疼痛辰砂一兩研牛黄生龍腦麝香各一分粉霜膩粉各一錢金箔十四片蠟二兩巴豆一百二十箇肥大者右丸量虚實加減龍腦漿水下夜半後服臟虚即以龍腦米飲下毎服三丸如小荳大藥勢緩即按令匾疾堅者加至十丸皆以針刺作數孔以行藥力小兒取積丸如菉荳治小兒吐逆尤效此藥最下胸中煩及虚積治小兒臍久不乾赤腫出膿及清水右用當歸焙乾為末研細著臍中頻用自差予家小兒當病臍濕五十餘日貼他藥不差聖恵有十餘方試之亦不效至此方一傅而乾後因尿入瘡復病又一貼愈治小兒熱𠻳馬牙硝白礬各半斤黄丹一分右同研入合子固濟火燒令紅覆潤地一夜再研加龍腦半錢甘草湯下一字或半錢治小兒疳肥瘡多生頭上浸􅁋久不差及耳瘡等悉主之石菉白芷等分右以生甘草洗瘡傅藥一日愈蘇沈良方卷八
